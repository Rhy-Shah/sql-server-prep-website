<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0e13;--bg2:#12151c;--bg3:#1a1d27;--bg4:#1e2230;--border:#1e2230;--border2:#2d3348;--text:#c8ccd4;--text2:#9ca3af;--text3:#6b7280;--heading:#f1f3f7;--subheading:#e2e5eb;--accent:#3b82f6;--accent2:#8b5cf6;--accent3:#6366f1;--green:#10b981;--green2:#34d399;--green-bg:#064e3b;--code-bg:#161921;--code-text:#a5f3a0;--h3-color:#a5b4fc}
html{font-size:16px;scroll-behavior:smooth}body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow:hidden}
.sidebar{width:300px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:100;transition:transform .25s ease}.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid var(--border)}.logo-badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:800;font-size:.8rem;padding:4px 10px;border-radius:6px;letter-spacing:1.5px}.logo-title{font-size:1.06rem;font-weight:700;color:var(--subheading);margin-top:8px;line-height:1.2}.logo-sub{font-size:.75rem;color:var(--text3);margin-top:2px}.progress-area{padding:14px 20px;border-bottom:1px solid var(--border)}.progress-track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .35s ease}.progress-label{font-size:.68rem;color:var(--text3);margin-top:6px}.nav{flex:1;overflow-y:auto;padding:8px 0}.nav::-webkit-scrollbar{width:4px}.nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}.chapter-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;border-left:3px solid transparent;transition:background .15s}.chapter-item:hover{background:var(--bg3)}.chapter-item.active{background:var(--bg3);border-left-color:var(--accent)}.chapter-icon{font-size:1.12rem;width:28px;text-align:center;flex-shrink:0}.chapter-title{font-size:.81rem;font-weight:600;color:var(--subheading);line-height:1.3}.chapter-meta{font-size:.68rem;color:var(--text3);margin-top:1px}.section-list{padding-bottom:4px}.section-item{display:flex;align-items:center;gap:8px;padding:6px 20px 6px 56px;cursor:pointer;font-size:.75rem;color:var(--text2);transition:all .15s}.section-item:hover{color:var(--subheading);background:rgba(255,255,255,.02)}.section-item.active{color:var(--subheading);background:var(--bg4)}.check{font-size:.75rem;color:var(--border2);width:16px;flex-shrink:0}.check.done{color:var(--green)}.main{margin-left:300px;flex:1;overflow-y:auto;height:100vh}.content{max-width:820px;margin:0 auto;padding:40px 32px 60px;width:100%;box-sizing:border-box}.breadcrumb{font-size:.72rem;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}.page-title{font-size:1.75rem;font-weight:800;color:var(--heading);margin-bottom:28px;line-height:1.25;letter-spacing:-.5px}.body-content{line-height:1.7}.body-content h3{font-size:1rem;font-weight:700;color:var(--h3-color);margin:24px 0 10px;line-height:1.3}.body-content p{margin:0 0 8px;font-size:.875rem;line-height:1.75;color:var(--text)}.body-content strong{color:var(--subheading);font-weight:600}.body-content .bullet{display:flex;gap:8px;margin:4px 0;font-size:.875rem;line-height:1.65;padding-left:4px}.body-content .bullet-dot{color:var(--accent);flex-shrink:0;margin-top:1px}.body-content .code-line{font-family:'JetBrains Mono','IBM Plex Mono',monospace;font-size:.78rem;color:var(--code-text);background:var(--code-bg);padding:2px 10px;margin:1px 0;border-left:2px solid var(--border2);white-space:pre-wrap;line-height:1.6}.body-content .comment-line{font-family:'JetBrains Mono','IBM Plex Mono',monospace;font-size:.78rem;color:var(--text3);font-style:italic;padding:2px 10px;margin:1px 0}.body-content .spacer{height:12px}.footer{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:40px;padding-top:24px;border-top:1px solid var(--border);flex-wrap:wrap}.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.81rem;font-weight:600;font-family:inherit;transition:all .15s}.btn:active{transform:scale(.97)}.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff}.btn-primary:hover{filter:brightness(1.1)}.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}.btn-outline:hover{border-color:var(--text2)}.btn-mark{background:var(--bg4);color:var(--text2)}.btn-mark:hover{background:var(--border2)}.btn-complete{background:var(--green-bg);color:var(--green2)}.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}.mobile-header{display:none;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);align-items:center;gap:12px;position:sticky;top:0;z-index:10}.menu-btn{background:none;border:1px solid var(--border2);color:var(--subheading);font-size:1.12rem;padding:4px 10px;border-radius:6px;cursor:pointer}.mobile-title{font-size:.875rem;font-weight:600;color:var(--subheading)}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;display:none}.overlay.show{display:block}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.mobile-header{display:flex}.content{padding:24px 16px 60px}.page-title{font-size:1.35rem}.footer{gap:8px}.btn{padding:8px 14px;font-size:.75rem}}

<main class="main" id="main"><div class="mobile-header"><button class="menu-btn" onclick="openSidebar()">&#9776;</button><span class="mobile-title" id="mobileTitle"></span></div><div class="content" id="content"></div></main>
<script>
const chapters = [{"id": 1, "title": "SQL Server Foundations", "icon": "🏗️", "sections": [{"title": "SQL Server Architecture", "content": "**How SQL Server Works Under the Hood**\n\nSQL Server is a relational database management system (RDBMS). When a query hits SQL Server, here's the pipeline:\n\n• **Protocol Layer (TDS)** — receives the query via Tabular Data Stream protocol over the network\n• **Query Parser** — checks syntax, builds a parse tree\n• **Algebrizer** — resolves names (tables, columns), type checking\n• **Query Optimizer** — generates execution plan (cost-based, the MOST important concept)\n• **Execution Engine** — runs the plan step by step\n• **Storage Engine** — reads/writes data from disk or memory via the Buffer Pool\n\n**Key Memory Components:**\n• **Buffer Pool** — cached data pages in RAM. SQL Server reads 8KB pages from disk into here. A \"page\" is the fundamental unit of storage.\n• **Plan Cache** — stores compiled execution plans so they don't need recompilation\n• **Log Buffer** — write-ahead log entries before flushing to the transaction log on disk\n\n**Storage Hierarchy:**\nDatabase → Filegroups → Files → Extents (8 pages) → Pages (8KB each)\n\n**Example — checking buffer pool usage:**\n-- How much memory is SQL Server using?\nSELECT\n    (total_physical_memory_kb / 1024) AS TotalRAM_MB,\n    (available_physical_memory_kb / 1024) AS AvailableRAM_MB\nFROM sys.dm_os_sys_memory;\n\n-- What's in the buffer pool right now?\nSELECT\n    DB_NAME(database_id) AS DatabaseName,\n    COUNT(*) * 8 / 1024 AS CachedSize_MB\nFROM sys.dm_os_buffer_descriptors\nGROUP BY database_id\nORDER BY CachedSize_MB DESC;\n\n**Interview Tip:** If asked \"what happens when you run a SELECT query,\" walk through this full 6-stage pipeline. It shows deep understanding beyond just writing SQL."}, {"title": "Data Types — What to Use When", "content": "**Choosing the right data type is a design question they WILL ask.**\n\n**Numeric Types:**\n• **INT** (4 bytes) — most common for IDs, counts. Range: -2.1B to 2.1B\n• **BIGINT** (8 bytes) — when INT range isn't enough\n• **DECIMAL(p,s)** — exact precision for money. NEVER use FLOAT for money!\n• **BIT** — boolean (0/1/NULL)\n• **MONEY** — avoid it. Use DECIMAL(19,4) instead. MONEY has rounding issues.\n\n**Example — MONEY rounding bug:**\nDECLARE @m1 MONEY = 1.00, @m2 MONEY = 3.00;\nSELECT @m1 / @m2 * @m2;\n-- Returns 0.9999, not 1.0000!\n\nDECLARE @d1 DECIMAL(19,4) = 1.00, @d2 DECIMAL(19,4) = 3.00;\nSELECT @d1 / @d2 * @d2;\n-- Returns 1.000000, correct!\n\n**String Types:**\n• **VARCHAR(n)** — variable-length, non-Unicode (1 byte/char). English-only.\n• **NVARCHAR(n)** — variable-length, Unicode (2 bytes/char). International.\n• **VARCHAR(MAX) / NVARCHAR(MAX)** — up to 2GB. Stored off-row when > 8000 bytes.\n• **CHAR(n)** — fixed-length. Only for codes like state abbreviations CHAR(2).\n\n**Example — VARCHAR vs NVARCHAR implicit conversion trap:**\n-- BAD: causes implicit conversion on EVERY row (scan, not seek)\nDECLARE @name NVARCHAR(50) = N'Smith';\nSELECT * FROM Agents WHERE LastName = @name;\n-- LastName is VARCHAR but @name is NVARCHAR!\n\n-- GOOD: match the types\nDECLARE @name2 VARCHAR(50) = 'Smith';\nSELECT * FROM Agents WHERE LastName = @name2;\n\n**Date Types:**\n• **DATE** — date only (3 bytes). Use for birth dates, effective dates.\n• **DATETIME2(7)** — preferred over DATETIME. More precision, wider range.\n• **DATETIMEOFFSET** — includes timezone info.\n\n**Insurance Domain Tip:** Policy numbers (VARCHAR), premium amounts (DECIMAL(19,4)), dates of birth (DATE), state codes (CHAR(2)).\n\n**Interview Question:** \"Why not use VARCHAR(MAX) everywhere?\"\nAnswer: It prevents optimizations — MAX types stored off-row, can't be index keys, optimizer makes different cardinality estimates."}, {"title": "Tables, Constraints & Normalization", "content": "**Table Design is the foundation of everything.**\n\n**Constraints — Data Integrity Guards:**\n• **PRIMARY KEY** — uniquely identifies each row. Creates clustered index by default.\n• **FOREIGN KEY** — referential integrity. CASCADE options: DELETE, UPDATE, SET NULL, NO ACTION\n• **UNIQUE** — no duplicates (allows one NULL)\n• **CHECK** — validates data: CHECK (Age >= 0 AND Age <= 150)\n• **DEFAULT** — provides value when none specified\n• **NOT NULL** — column must have a value\n\n**Example — Creating a table with all constraint types:**\nCREATE TABLE dbo.Policies (\n    PolicyID      INT IDENTITY(1,1) PRIMARY KEY,\n    PolicyNumber  VARCHAR(20) NOT NULL UNIQUE,\n    CarrierID     INT NOT NULL\n        REFERENCES dbo.Carriers(CarrierID)\n        ON DELETE NO ACTION,\n    PremiumAmount DECIMAL(19,4) NOT NULL\n        CHECK (PremiumAmount >= 0),\n    Status        VARCHAR(20) NOT NULL\n        DEFAULT 'Active'\n        CHECK (Status IN ('Active','Lapsed','Cancelled')),\n    EffectiveDate DATE NOT NULL,\n    ExpirationDate DATE NOT NULL,\n    CreatedDate   DATETIME2 NOT NULL DEFAULT SYSDATETIME(),\n    CONSTRAINT CK_DateRange CHECK (ExpirationDate > EffectiveDate)\n);\n\n**Normalization (they WILL ask this):**\n• **1NF** — No repeating groups. Each cell has one atomic value.\n• **2NF** — 1NF + No partial dependencies (every non-key column depends on FULL PK)\n• **3NF** — 2NF + No transitive dependencies (non-key columns don't depend on other non-key columns)\n• **BCNF** — Every determinant is a candidate key\n\n**When to DENORMALIZE:**\n• Reporting/read-heavy workloads\n• When JOINs become too expensive\n• Data warehousing (star schema)\n• Always denormalize with intention, not laziness"}]}, {"id": 2, "title": "T-SQL Mastery", "icon": "⚡", "sections": [{"title": "Joins — The Complete Picture", "content": "**Every database interview tests JOIN knowledge.**\n\n**Example — All JOIN types demonstrated:**\n\n-- INNER JOIN: only agents WITH policies\nSELECT a.AgentName, p.PolicyNumber\nFROM Agents a\nINNER JOIN Policies p ON a.AgentID = p.AgentID;\n\n-- LEFT JOIN: ALL agents, even without policies\nSELECT a.AgentName, p.PolicyNumber\nFROM Agents a\nLEFT JOIN Policies p ON a.AgentID = p.AgentID;\n-- Agents without policies show NULL for PolicyNumber\n\n-- Find agents WITHOUT any policies (anti-join):\nSELECT a.AgentName\nFROM Agents a\nLEFT JOIN Policies p ON a.AgentID = p.AgentID\nWHERE p.PolicyID IS NULL;\n\n-- FULL OUTER JOIN: all from both sides\nSELECT a.AgentName, p.PolicyNumber\nFROM Agents a\nFULL OUTER JOIN Policies p ON a.AgentID = p.AgentID;\n\n-- CROSS JOIN: every combination (cartesian product)\nSELECT a.AgentName, t.TypeName\nFROM Agents a CROSS JOIN PolicyTypes t;\n\n-- SELF JOIN: employee to manager hierarchy\nSELECT e.Name AS Employee, m.Name AS Manager\nFROM Employees e\nLEFT JOIN Employees m ON e.ManagerID = m.EmpID;\n\n**Critical: APPLY Operators (SQL Server specific!)**\n• **CROSS APPLY** — like INNER JOIN for correlated subqueries/TVFs\n• **OUTER APPLY** — like LEFT JOIN version\n\n**Example — Top 3 policies per agent:**\nSELECT a.AgentName, p.PolicyNumber, p.EffectiveDate\nFROM Agents a\nCROSS APPLY (\n    SELECT TOP 3 PolicyNumber, EffectiveDate\n    FROM Policies\n    WHERE Policies.AgentID = a.AgentID\n    ORDER BY EffectiveDate DESC\n) p;\n\n**Interview Trap:** \"LEFT JOIN vs LEFT OUTER JOIN?\" — They're identical. OUTER is optional syntax."}, {"title": "Window Functions — Your Secret Weapon", "content": "**Window functions calculate across related rows WITHOUT collapsing like GROUP BY.**\n\n**All ranking functions compared:**\nSELECT AgentName, TotalSales,\n    ROW_NUMBER() OVER (ORDER BY TotalSales DESC) AS RowNum,\n    RANK()       OVER (ORDER BY TotalSales DESC) AS Rnk,\n    DENSE_RANK() OVER (ORDER BY TotalSales DESC) AS DenseRnk,\n    NTILE(3)     OVER (ORDER BY TotalSales DESC) AS Tercile\nFROM AgentSales;\n-- If two agents tie at #2:\n-- ROW_NUMBER: 1,2,3,4  (arbitrary tiebreak)\n-- RANK:       1,2,2,4  (gap at 3)\n-- DENSE_RANK: 1,2,2,3  (no gap)\n\n**Running totals and moving averages:**\nSELECT PolicyID, Premium,\n    SUM(Premium) OVER (\n        ORDER BY EffectiveDate\n        ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n    ) AS RunningTotal,\n    AVG(Premium) OVER (\n        ORDER BY EffectiveDate\n        ROWS BETWEEN 2 PRECEDING AND CURRENT ROW\n    ) AS MovingAvg3\nFROM Policies;\n\n**LAG and LEAD — compare to previous/next row:**\nSELECT PolicyID, Premium,\n    LAG(Premium, 1) OVER (ORDER BY EffectiveDate) AS PrevPremium,\n    Premium - LAG(Premium, 1) OVER (ORDER BY EffectiveDate) AS Change\nFROM Policies;\n\n**Classic Interview: Second highest salary:**\nWITH Ranked AS (\n    SELECT Salary,\n        DENSE_RANK() OVER (ORDER BY Salary DESC) AS Rnk\n    FROM Employees\n)\nSELECT Salary FROM Ranked WHERE Rnk = 2;\n\n**Top N per group (very common):**\nWITH Ranked AS (\n    SELECT AgentID, PolicyNumber, Premium,\n        ROW_NUMBER() OVER (\n            PARTITION BY AgentID ORDER BY Premium DESC\n        ) AS rn\n    FROM Policies\n)\nSELECT * FROM Ranked WHERE rn <= 3;\n-- Top 3 highest premium policies PER agent"}, {"title": "CTEs, Subqueries & Temp Tables", "content": "**When to use what — interviewers love asking this.**\n\n**CTE Example:**\nWITH ActivePolicies AS (\n    SELECT PolicyID, AgentID, Premium\n    FROM Policies WHERE Status = 'Active'\n)\nSELECT a.AgentName, SUM(ap.Premium) AS TotalPremium\nFROM Agents a\nJOIN ActivePolicies ap ON a.AgentID = ap.AgentID\nGROUP BY a.AgentName;\n\n**Recursive CTE — Org Chart:**\nWITH OrgChart AS (\n    SELECT EmpID, Name, ManagerID, 0 AS Level,\n        CAST(Name AS VARCHAR(500)) AS Path\n    FROM Employees WHERE ManagerID IS NULL\n    UNION ALL\n    SELECT e.EmpID, e.Name, e.ManagerID, oc.Level + 1,\n        CAST(oc.Path + ' > ' + e.Name AS VARCHAR(500))\n    FROM Employees e\n    JOIN OrgChart oc ON e.ManagerID = oc.EmpID\n)\nSELECT * FROM OrgChart ORDER BY Path;\n\n**Temp Tables vs Table Variables:**\n-- Temp table: has statistics, can index, good for large sets\nCREATE TABLE #StagingData (\n    ID INT PRIMARY KEY,\n    AgentID INT INDEX IX_Agent,\n    Premium DECIMAL(19,4)\n);\n\n-- Table variable: NO statistics, optimizer assumes 1 row!\nDECLARE @SmallLookup TABLE (\n    Code VARCHAR(10) PRIMARY KEY,\n    Description VARCHAR(100)\n);\n-- ONLY use for small sets (< 1000 rows)\n\n**Decision Framework:**\n• Need it once, readable → CTE\n• Need it multiple times, large data → #temp table\n• Small lookup, < 1000 rows → @table variable\n• Recursive/hierarchical → Recursive CTE"}, {"title": "Advanced T-SQL Patterns", "content": "**Patterns that show you're senior-level.**\n\n**MERGE Statement (Upsert):**\nMERGE INTO dbo.Policies AS t\nUSING dbo.StagingPolicies AS s ON t.PolicyNumber = s.PolicyNumber\nWHEN MATCHED THEN\n    UPDATE SET t.PremiumAmount = s.PremiumAmount,\n              t.ModifiedDate = SYSDATETIME()\nWHEN NOT MATCHED BY TARGET THEN\n    INSERT (PolicyNumber, CarrierID, PremiumAmount)\n    VALUES (s.PolicyNumber, s.CarrierID, s.PremiumAmount)\nWHEN NOT MATCHED BY SOURCE THEN DELETE\nOUTPUT $action, inserted.PolicyNumber, deleted.PolicyNumber;\n\n**PIVOT — rows to columns:**\nSELECT AgentID, [Health], [Life], [Auto]\nFROM (SELECT AgentID, InsuranceType, Premium FROM Policies) src\nPIVOT (SUM(Premium) FOR InsuranceType IN ([Health], [Life], [Auto])) pvt;\n\n**Dynamic SQL with sp_executesql:**\nDECLARE @sql NVARCHAR(MAX), @table NVARCHAR(128) = N'Policies';\nSET @sql = N'SELECT COUNT(*) FROM ' + QUOTENAME(@table)\n    + N' WHERE Status = @status';\nEXEC sp_executesql @sql, N'@status VARCHAR(20)', @status = 'Active';\n-- ALWAYS use sp_executesql over EXEC() — prevents injection\n\n**TRY...CATCH Error Handling:**\nBEGIN TRY\n    BEGIN TRANSACTION;\n    UPDATE Policies SET Status = 'Cancelled' WHERE PolicyID = @id;\n    INSERT INTO AuditLog (Action, PolicyID) VALUES ('Cancel', @id);\n    COMMIT;\nEND TRY\nBEGIN CATCH\n    IF @@TRANCOUNT > 0 ROLLBACK;\n    INSERT INTO ErrorLog (Msg, Num, Line)\n    VALUES (ERROR_MESSAGE(), ERROR_NUMBER(), ERROR_LINE());\n    THROW;\nEND CATCH;\n\n**GROUPING SETS — multiple aggregations in one pass:**\nSELECT\n    COALESCE(State, '(All)') AS State,\n    COALESCE(InsuranceType, '(All)') AS Type,\n    SUM(Premium) AS TotalPremium, COUNT(*) AS Cnt\nFROM Policies\nGROUP BY GROUPING SETS ((State, InsuranceType), (State), ());"}]}, {"id": 3, "title": "Stored Procedures & Programming", "icon": "🔧", "sections": [{"title": "Stored Procedure Design", "content": "**This is a CORE requirement of the JD. Expect to write one live.**\n\n**Complete production-ready stored procedure:**\nCREATE OR ALTER PROCEDURE dbo.usp_GetAgentPolicies\n    @AgentID      INT,\n    @StartDate    DATE = NULL,\n    @Status       VARCHAR(20) = 'Active',\n    @TotalPremium DECIMAL(19,4) OUTPUT,\n    @PolicyCount  INT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET XACT_ABORT ON;\n\n    IF @AgentID IS NULL\n    BEGIN\n        RAISERROR('AgentID cannot be NULL', 16, 1);\n        RETURN -1;\n    END;\n\n    SELECT PolicyID, PolicyNumber, Premium, EffectiveDate\n    FROM dbo.Policies\n    WHERE AgentID = @AgentID\n      AND Status = @Status\n      AND (@StartDate IS NULL OR EffectiveDate >= @StartDate)\n    ORDER BY EffectiveDate DESC;\n\n    SELECT @TotalPremium = SUM(Premium),\n           @PolicyCount = COUNT(*)\n    FROM dbo.Policies\n    WHERE AgentID = @AgentID AND Status = @Status;\nEND;\n\n**Calling it:**\nDECLARE @total DECIMAL(19,4), @cnt INT;\nEXEC dbo.usp_GetAgentPolicies\n    @AgentID = 42,\n    @StartDate = '2025-01-01',\n    @TotalPremium = @total OUTPUT,\n    @PolicyCount = @cnt OUTPUT;\nSELECT @total AS TotalPremium, @cnt AS PolicyCount;\n\n**Best Practices:**\n• Always **SET NOCOUNT ON** — reduces network traffic\n• Use schema prefix (dbo.) — avoids extra name resolution\n• Name with **usp_** prefix. NEVER use **sp_** — checks master DB first!\n• Validate inputs early, fail fast\n• Avoid SELECT * — list columns explicitly\n\n**Parameter Sniffing (CRITICAL interview topic):**\nSQL Server compiles a plan based on the FIRST parameter values. If atypical, the plan may be terrible for subsequent calls.\n\n**Fixes for parameter sniffing:**\n-- Fix 1: Recompile every time\nOPTION (RECOMPILE);\n\n-- Fix 2: Optimize for typical value\nOPTION (OPTIMIZE FOR (@AgentID = 100));\n\n-- Fix 3: Optimize for unknown (average statistics)\nOPTION (OPTIMIZE FOR UNKNOWN);\n\n-- Fix 4: Local variable (breaks sniffing)\nDECLARE @localAgent INT = @AgentID;\nSELECT ... WHERE AgentID = @localAgent;"}, {"title": "Views, Functions & Triggers", "content": "**Three object types that complete your T-SQL programming skills.**\n\n**Indexed View (materialized):**\nCREATE VIEW dbo.vw_ActivePolicies WITH SCHEMABINDING AS\nSELECT p.PolicyID, p.Premium, p.EffectiveDate,\n       a.AgentID, c.CarrierID\nFROM dbo.Policies p\nJOIN dbo.Agents a ON p.AgentID = a.AgentID\nJOIN dbo.Carriers c ON p.CarrierID = c.CarrierID\nWHERE p.Status = 'Active';\n\nCREATE UNIQUE CLUSTERED INDEX IX_vw ON dbo.vw_ActivePolicies (PolicyID);\n-- Now physically stored and auto-maintained!\n\n**Three UDF types — know the performance ranking:**\n\n**1. Scalar UDF (SLOW — called once per row!):**\nCREATE FUNCTION dbo.fn_CalcAge(@DOB DATE)\nRETURNS INT AS\nBEGIN\n    RETURN DATEDIFF(YEAR, @DOB, GETDATE()) -\n        CASE WHEN DATEADD(YEAR, DATEDIFF(YEAR, @DOB, GETDATE()), @DOB)\n            > GETDATE() THEN 1 ELSE 0 END;\nEND;\n-- WARNING: 1M rows = 1M function calls. No parallelism!\n\n**2. Inline TVF (FAST — optimizer inlines it like a subquery):**\nCREATE FUNCTION dbo.fn_GetAgentPolicies(@AgentID INT)\nRETURNS TABLE AS RETURN\n    SELECT PolicyID, PolicyNumber, Premium\n    FROM Policies\n    WHERE AgentID = @AgentID AND Status = 'Active';\n\n-- Usage:\nSELECT a.AgentName, p.PolicyNumber\nFROM Agents a\nCROSS APPLY dbo.fn_GetAgentPolicies(a.AgentID) p;\n\n**3. Multi-Statement TVF (medium — optimizer can't see inside):**\nCREATE FUNCTION dbo.fn_AgentSummary(@AgentID INT)\nRETURNS @r TABLE (TotalPolicies INT, TotalPremium DECIMAL(19,4))\nAS BEGIN\n    INSERT INTO @r SELECT COUNT(*), SUM(Premium)\n    FROM Policies WHERE AgentID = @AgentID;\n    RETURN;\nEND;\n\n**Performance ranking:** Inline TVF > Computed column > Subquery > Multi-stmt TVF > Scalar UDF\n\n**Trigger example with audit logging:**\nCREATE TRIGGER dbo.trg_AuditPolicyChange ON dbo.Policies\nAFTER UPDATE AS\nBEGIN\n    SET NOCOUNT ON;\n    INSERT INTO AuditLog (TableName, Action, RecordID, OldVal, NewVal, ChangedDate)\n    SELECT 'Policies', 'UPDATE', i.PolicyID,\n        CAST(d.PremiumAmount AS VARCHAR), CAST(i.PremiumAmount AS VARCHAR),\n        SYSDATETIME()\n    FROM inserted i JOIN deleted d ON i.PolicyID = d.PolicyID\n    WHERE i.PremiumAmount <> d.PremiumAmount;\nEND;\n\n• **inserted** and **deleted** are virtual tables inside triggers\n• AFTER triggers (most common) vs INSTEAD OF triggers\n• NEVER put business logic in triggers if avoidable"}]}, {"id": 4, "title": "Indexing & Performance Tuning", "icon": "🚀", "sections": [{"title": "Index Types Deep Dive", "content": "**Performance tuning is THE #1 skill they want.**\n\n**Clustered Index:** Defines PHYSICAL order. Only ONE per table. Leaf = data rows.\n\n**Non-Clustered Index:** Separate B-tree. Leaf = key + pointer to clustered key.\n\n**Example — creating the optimal index for a query:**\n-- This query:\nSELECT PolicyNumber, Premium, EffectiveDate\nFROM Policies\nWHERE AgentID = 42 AND Status = 'Active'\nORDER BY EffectiveDate DESC;\n\n-- Optimal covering index:\nCREATE NONCLUSTERED INDEX IX_Policies_Agent_Status\nON dbo.Policies (AgentID, Status, EffectiveDate DESC)\nINCLUDE (PolicyNumber, Premium);\n-- Key columns = filter/sort. INCLUDE = SELECT columns. No Key Lookup!\n\n**Filtered Index (smaller, faster):**\nCREATE INDEX IX_ActiveOnly\nON Policies (AgentID, EffectiveDate) INCLUDE (PolicyNumber, Premium)\nWHERE Status = 'Active';\n\n**Columnstore Index (analytics):**\nCREATE NONCLUSTERED COLUMNSTORE INDEX IX_CS\nON Policies (AgentID, CarrierID, PremiumAmount, EffectiveDate);\n-- 10x compression. Perfect for SUM/AVG over millions of rows.\n\n**Finding unused indexes:**\nSELECT i.name, s.user_seeks, s.user_scans, s.user_updates\nFROM sys.indexes i\nJOIN sys.dm_db_index_usage_stats s\n    ON i.object_id = s.object_id AND i.index_id = s.index_id\nWHERE s.user_seeks + s.user_scans + s.user_lookups = 0\nORDER BY s.user_updates DESC;\n-- These cost writes but give zero reads — remove them!\n\n**Index Maintenance:**\n-- Check fragmentation:\nSELECT avg_fragmentation_in_percent, page_count\nFROM sys.dm_db_index_physical_stats(DB_ID(), OBJECT_ID('Policies'), NULL, NULL, 'LIMITED');\n\n-- < 10%: nothing. 10-30%: REORGANIZE. > 30%: REBUILD\nALTER INDEX IX_Policies_Agent ON Policies REORGANIZE;\nALTER INDEX IX_Policies_Agent ON Policies REBUILD WITH (ONLINE = ON);"}, {"title": "Reading Execution Plans", "content": "**If you can't read a plan, you can't performance tune.**\n\n**How to get one:**\nSET STATISTICS IO ON;\nSET STATISTICS TIME ON;\n-- Ctrl+M = Actual Plan. Ctrl+L = Estimated Plan.\n\n**Key Operators — Good vs Bad:**\n• **Index Seek** — B-tree nav to exact rows. O(log n). THE GOAL.\n• **Nested Loop** — good when outer is small + inner has index.\n• **Merge Join** — efficient for two pre-sorted large inputs.\n• **Index Scan** — reads entire index. OK small tables, bad on large.\n• **Hash Match** — hash table in memory. Can spill to tempdb.\n• **Table Scan** — reads EVERY row. No useful index. BAD.\n• **Key Lookup** — after NC seek, goes BACK to clustered index. FIX with INCLUDE.\n\n**Example — diagnosing and fixing a slow query:**\nSET STATISTICS IO ON;\nSELECT PolicyNumber, Premium FROM Policies WHERE AgentID = 42;\n-- Output: logical reads 15234 (reading whole table!)\n-- Plan shows: Clustered Index SCAN\n\n-- Fix: add covering index\nCREATE INDEX IX_Agent ON Policies (AgentID) INCLUDE (PolicyNumber, Premium);\n\n-- Re-run: logical reads 3. 5000x faster!\n-- Plan shows: Index SEEK\n\n**Yellow Warning Triangles mean:**\n• Implicit type conversion (VARCHAR vs NVARCHAR)\n• Missing or stale statistics\n• Estimated vs actual row mismatch\n• Memory grant warnings (spilling to tempdb)\n\n**Golden Rule:** Optimize **logical reads**. Fewer pages = faster query."}, {"title": "Query Optimization Strategies", "content": "**Practical techniques to make queries faster.**\n\n**1. SARGability — can the optimizer use an index seek?**\n-- BAD (non-SARGable):\nWHERE YEAR(EffectiveDate) = 2025\nWHERE ISNULL(Premium, 0) > 100\nWHERE LastName LIKE '%son'\n\n-- GOOD (SARGable):\nWHERE EffectiveDate >= '2025-01-01' AND EffectiveDate < '2026-01-01'\nWHERE Premium > 100\nWHERE LastName LIKE 'John%'\n\n**2. NOT IN vs NOT EXISTS (critical!):**\n-- BAD: NOT IN fails silently with NULLs!\nSELECT * FROM Agents\nWHERE AgentID NOT IN (SELECT AgentID FROM Policies);\n-- If ANY AgentID in Policies is NULL, returns ZERO rows!\n\n-- GOOD: NOT EXISTS is NULL-safe\nSELECT * FROM Agents a\nWHERE NOT EXISTS (\n    SELECT 1 FROM Policies p WHERE p.AgentID = a.AgentID\n);\n\n**3. Replacing Cursors with Set-Based Logic:**\n-- BAD: cursor (1M iterations)\nDECLARE cur CURSOR FOR SELECT PolicyID, Premium FROM Policies;\n-- ... WHILE @@FETCH_STATUS = 0 ... UPDATE one row at a time\n\n-- GOOD: single set-based update (1 operation)\nUPDATE Policies SET Premium = Premium * 1.05;\n\n**4. Query Store — flight recorder (SQL 2016+):**\nALTER DATABASE InsuranceDB SET QUERY_STORE = ON;\n\nSELECT TOP 10 qt.query_sql_text,\n    rs.avg_duration, rs.avg_logical_io_reads\nFROM sys.query_store_query_text qt\nJOIN sys.query_store_query q ON qt.query_text_id = q.query_text_id\nJOIN sys.query_store_plan p ON q.query_id = p.query_id\nJOIN sys.query_store_runtime_stats rs ON p.plan_id = rs.plan_id\nORDER BY rs.avg_duration DESC;"}, {"title": "Blocking, Deadlocks & Concurrency", "content": "**The JD specifically mentions blocking and deadlocking.**\n\n**Detecting Blocking:**\n-- Quick view:\nEXEC sp_who2;\n\n-- Detailed DMV query:\nSELECT r.session_id, r.blocking_session_id, r.wait_type,\n    t.text AS query_text\nFROM sys.dm_exec_requests r\nCROSS APPLY sys.dm_exec_sql_text(r.sql_handle) t\nWHERE r.blocking_session_id > 0;\n\n**Deadlock Example:**\n-- Session A:                    Session B:\nBEGIN TRAN;                      BEGIN TRAN;\nUPDATE Agents SET ...;           UPDATE Policies SET ...;\n-- holds X lock on Agents        -- holds X lock on Policies\nUPDATE Policies SET ...;         UPDATE Agents SET ...;\n-- WAITS for Policies            -- WAITS for Agents\n-- DEADLOCK! SQL kills one.\n\n-- Fix: access tables in SAME order in both sessions\n\n**Isolation Levels:**\n• **READ UNCOMMITTED** — dirty reads. Same as NOLOCK.\n• **READ COMMITTED** — default. No dirty reads.\n• **RCSI (Read Committed Snapshot)** — readers never block writers!\n• **REPEATABLE READ** — locks held until transaction ends.\n• **SERIALIZABLE** — full range locks. Maximum blocking.\n• **SNAPSHOT** — optimistic via row versioning.\n\n**Enabling RCSI (best solution for most blocking):**\nALTER DATABASE InsuranceDB SET READ_COMMITTED_SNAPSHOT ON;\n\n**Deadlock Detection:**\nDBCC TRACEON (1222, -1);\n-- Or Extended Events:\nCREATE EVENT SESSION [Deadlocks] ON SERVER\nADD EVENT sqlserver.xml_deadlock_report\nADD TARGET package0.event_file(SET filename=N'Deadlocks.xel');"}]}, {"id": 5, "title": "SSIS & DB Administration", "icon": "📦", "sections": [{"title": "SSIS Packages — ETL Fundamentals", "content": "**The JD explicitly requires SSIS experience.**\n\n**Control Flow tasks:** Execute SQL, Data Flow Task, Script Task, Foreach Loop, Sequence Container, Send Mail, Precedence Constraints (success/failure arrows).\n\n**Data Flow components:**\nSources: OLE DB, Flat File, Excel\nTransforms: Derived Column, Conditional Split, Lookup, Aggregate, Data Conversion, SCD\nDestinations: OLE DB Destination, SQL Server Destination\n\n**Common Scenario: \"Load a daily vendor file\"**\n1. Foreach Loop Container → iterate files in folder\n2. Data Flow Task inside the loop:\n   a. Flat File Source → read CSV\n   b. Data Conversion → fix types\n   c. Lookup → validate CarrierID exists\n   d. Conditional Split → valid vs invalid rows\n   e. OLE DB Destination → staging table\n   f. Error Output → error table\n3. Execute SQL Task → MERGE staging into production\n4. Send Mail Task (on failure) → alert team\n\n**Error Handling:**\n• Row-level: redirect error rows to error output\n• Task-level: precedence constraints on failure\n• Package-level: OnError event handlers\n\n**SSIS Architecture:**\n• Package (.dtsx) — deployable unit\n• Project Deployment Model → SSISDB catalog\n• Environment Variables → parameterize for dev/test/prod\n\n**Performance Tips:**\n• SQL Server Destination fastest (package on server)\n• Tune DefaultBufferMaxRows and DefaultBufferSize\n• Minimize blocking transforms (Sort, Aggregate)\n• Use staging + MERGE over row-by-row lookups"}, {"title": "SQL Server Agent & Automation", "content": "**The JD mentions \"SQL Agent for regular SQL tasks.\"**\n\n**Job Components:** Job → Steps → Schedule → Alerts → Operators → Proxies\n\n**Example — nightly maintenance job steps:**\n-- Step 1: Update statistics\nEXEC sp_updatestats;\n\n-- Step 2: Rebuild fragmented indexes\nDECLARE @sql NVARCHAR(MAX) = '';\nSELECT @sql += 'ALTER INDEX ' + i.name + ' ON ' + OBJECT_NAME(i.object_id)\n    + CASE WHEN ps.avg_fragmentation_in_percent > 30\n        THEN ' REBUILD; ' ELSE ' REORGANIZE; ' END\nFROM sys.indexes i\nCROSS APPLY sys.dm_db_index_physical_stats(\n    DB_ID(), i.object_id, i.index_id, NULL, 'LIMITED') ps\nWHERE ps.avg_fragmentation_in_percent > 10 AND i.name IS NOT NULL;\nEXEC sp_executesql @sql;\n\n-- Step 3: Database integrity check\nDBCC CHECKDB ('InsuranceDB') WITH NO_INFOMSGS;\n\n**Common Production Jobs:**\n• Nightly ETL (SSIS packages)\n• Index maintenance\n• Statistics updates\n• Backups (full nightly, log every 15 min)\n• Data purge/archival\n• Health monitoring\n\n**Database Mail (for notifications):**\nEXEC msdb.dbo.sp_send_dbmail\n    @profile_name = 'DBMailProfile',\n    @recipients = 'dba@idealconcepts.com',\n    @subject = 'Job Failed: Nightly ETL',\n    @body = 'Check SSISDB execution logs.';"}, {"title": "Backup, Recovery & HA", "content": "**Recovery Models:** SIMPLE (dev), FULL (production), BULK-LOGGED (bulk loads)\n\n**Backup Examples:**\n-- Full backup\nBACKUP DATABASE InsuranceDB\nTO DISK = 'D:\\Backups\\Full.bak'\nWITH COMPRESSION, CHECKSUM, INIT;\n\n-- Differential\nBACKUP DATABASE InsuranceDB\nTO DISK = 'D:\\Backups\\Diff.bak' WITH DIFFERENTIAL, COMPRESSION;\n\n-- Transaction log\nBACKUP LOG InsuranceDB\nTO DISK = 'D:\\Backups\\Log.trn' WITH COMPRESSION;\n\n**Schedule:** Full nightly → Diff every 4-6h → Log every 15min. RPO = 15 min.\n\n**Point-in-Time Restore:**\nRESTORE DATABASE InsuranceDB FROM DISK = 'Full.bak' WITH NORECOVERY;\nRESTORE DATABASE InsuranceDB FROM DISK = 'Diff.bak' WITH NORECOVERY;\nRESTORE LOG InsuranceDB FROM DISK = 'Log.trn'\n    WITH STOPAT = '2025-06-15T14:30:00', RECOVERY;\n\n**High Availability:**\n• **Always On AG** — enterprise HA, auto failover, readable secondaries\n• **Log Shipping** — simple, low cost\n• **Database Mirroring** — deprecated but still seen\n• **Failover Cluster** — OS-level, shared storage\n\n**DR Metrics:** RPO = acceptable data loss. RTO = time to recover."}]}, {"id": 6, "title": "Database Design & ER Diagrams", "icon": "📐", "sections": [{"title": "Schema Design Patterns", "content": "**OLTP vs OLAP Design:**\n\n**OLTP (transactional):** Normalized 3NF, optimized for writes, FK enforced.\n**OLAP (analytical):** Denormalized star schema, optimized for aggregations.\n\n**Star Schema Example:**\nCREATE TABLE Fact_PolicyTransactions (\n    TransactionID INT IDENTITY PRIMARY KEY,\n    DateKey       INT REFERENCES Dim_Date(DateKey),\n    AgentKey      INT REFERENCES Dim_Agent(AgentKey),\n    CarrierKey    INT REFERENCES Dim_Carrier(CarrierKey),\n    PremiumAmount DECIMAL(19,4),\n    CommissionAmt DECIMAL(19,4),\n    PolicyCount   INT DEFAULT 1\n);\n\nCREATE TABLE Dim_Date (\n    DateKey   INT PRIMARY KEY,\n    FullDate  DATE NOT NULL,\n    Year INT, Quarter INT, Month INT,\n    MonthName VARCHAR(20), DayOfWeek VARCHAR(20),\n    IsWeekend BIT, IsHoliday BIT\n);\n\n**Slowly Changing Dimensions (SCD):**\n• **Type 1** — overwrite (no history)\n• **Type 2** — new row with StartDate/EndDate/IsCurrent (full history)\n• **Type 3** — add PreviousValue column (limited history)\n\n**Design Principles:**\n• Surrogate keys (INT IDENTITY) for internal use\n• Natural keys (PolicyNumber) for business use\n• Audit columns on every table: CreatedDate, ModifiedDate, CreatedBy, ModifiedBy\n• Soft deletes (IsActive flag) vs hard deletes\n• Consistent naming conventions throughout"}, {"title": "ERD Relationship Types", "content": "**Three relationship types you must know.**\n\n**1. One-to-One (1:1) — rare:**\nCREATE TABLE AgentProfiles (\n    ProfileID INT PRIMARY KEY,\n    AgentID   INT NOT NULL UNIQUE\n        REFERENCES Agents(AgentID),\n    Bio NVARCHAR(MAX), PhotoURL VARCHAR(500)\n);\n-- UNIQUE on FK makes it 1:1. Usually means merge the tables.\n\n**2. One-to-Many (1:M) — most common:**\nCREATE TABLE Policies (\n    PolicyID  INT PRIMARY KEY,\n    CarrierID INT NOT NULL\n        REFERENCES Carriers(CarrierID),\n    PolicyNumber VARCHAR(20) NOT NULL\n);\n-- FK on the \"many\" side. One carrier → many policies.\n\n**3. Many-to-Many (M:M) — requires junction table:**\nCREATE TABLE AgentCarriers (\n    AgentCarrierID INT IDENTITY PRIMARY KEY,\n    AgentID   INT NOT NULL REFERENCES Agents(AgentID),\n    CarrierID INT NOT NULL REFERENCES Carriers(CarrierID),\n    CommissionRate DECIMAL(5,4),\n    StartDate DATE NOT NULL,\n    EndDate   DATE,\n    CONSTRAINT UQ_AC UNIQUE (AgentID, CarrierID, StartDate)\n);\n-- Junction table holds BOTH FKs + relationship data.\n-- SQL has no native M:M — always say \"junction table.\"\n\n**Crow's Foot Notation:**\n||--------||  = exactly one to exactly one (1:1)\n||--------o{  = one to zero-or-many (1:M)\n}o--------o{  = many to many (M:M, via junction)\n\nSymbols: || = exactly one, o{ = zero or many, |{ = one or many\n\n**Interview tip:** \"How do you implement M:M?\" → \"Junction table with FKs to both sides plus relationship-specific attributes like dates or rates.\""}, {"title": "Insurance Domain Schema", "content": "**Complete schema for Ideal Concepts (insurance company).**\n\nCREATE TABLE dbo.Carriers (\n    CarrierID    INT IDENTITY(1,1) PRIMARY KEY,\n    CarrierName  VARCHAR(100) NOT NULL UNIQUE,\n    CarrierCode  VARCHAR(20) NOT NULL UNIQUE,\n    IsActive     BIT NOT NULL DEFAULT 1,\n    CreatedDate  DATETIME2 NOT NULL DEFAULT SYSDATETIME(),\n    ModifiedDate DATETIME2 NOT NULL DEFAULT SYSDATETIME()\n);\n\nCREATE TABLE dbo.PolicyTypes (\n    PolicyTypeID INT IDENTITY(1,1) PRIMARY KEY,\n    TypeName     VARCHAR(50) NOT NULL UNIQUE,\n    Description  VARCHAR(200),\n    IsActive     BIT NOT NULL DEFAULT 1\n);\n\nCREATE TABLE dbo.Agents (\n    AgentID      INT IDENTITY(1,1) PRIMARY KEY,\n    FirstName    VARCHAR(50) NOT NULL,\n    LastName     VARCHAR(50) NOT NULL,\n    Email        VARCHAR(100) NOT NULL UNIQUE,\n    GovIssuedID  VARCHAR(50),\n    IsActive     BIT NOT NULL DEFAULT 1,\n    CreatedDate  DATETIME2 NOT NULL DEFAULT SYSDATETIME(),\n    ModifiedDate DATETIME2 NOT NULL DEFAULT SYSDATETIME()\n);\n\nCREATE TABLE dbo.AgentStates (\n    AgentStateID  INT IDENTITY(1,1) PRIMARY KEY,\n    AgentID       INT NOT NULL REFERENCES dbo.Agents(AgentID),\n    StateCode     CHAR(2) NOT NULL,\n    LicenseNumber VARCHAR(50),\n    ExpirationDate DATE,\n    CONSTRAINT UQ_AgentState UNIQUE (AgentID, StateCode)\n);\n\nCREATE TABLE dbo.AgentCarriers (\n    AgentCarrierID INT IDENTITY(1,1) PRIMARY KEY,\n    AgentID   INT NOT NULL REFERENCES dbo.Agents(AgentID),\n    CarrierID INT NOT NULL REFERENCES dbo.Carriers(CarrierID),\n    CommissionRate DECIMAL(5,4) CHECK (CommissionRate BETWEEN 0 AND 1),\n    StartDate DATE NOT NULL, EndDate DATE,\n    CONSTRAINT UQ_AC UNIQUE (AgentID, CarrierID, StartDate)\n);\n\nCREATE TABLE dbo.Clients (\n    ClientID    INT IDENTITY(1,1) PRIMARY KEY,\n    FirstName   VARCHAR(50) NOT NULL,\n    LastName    VARCHAR(50) NOT NULL,\n    DateOfBirth DATE NOT NULL,\n    Email       VARCHAR(100),\n    Phone       VARCHAR(20),\n    SSNHash     VARBINARY(64),\n    CreatedDate DATETIME2 NOT NULL DEFAULT SYSDATETIME(),\n    ModifiedDate DATETIME2 NOT NULL DEFAULT SYSDATETIME()\n);\n\nCREATE TABLE dbo.Policies (\n    PolicyID      INT IDENTITY(1,1) PRIMARY KEY,\n    PolicyNumber  VARCHAR(20) NOT NULL UNIQUE,\n    CarrierID     INT NOT NULL REFERENCES dbo.Carriers(CarrierID),\n    PolicyTypeID  INT NOT NULL REFERENCES dbo.PolicyTypes(PolicyTypeID),\n    PremiumAmount DECIMAL(19,4) NOT NULL CHECK (PremiumAmount >= 0),\n    EffectiveDate DATE NOT NULL,\n    ExpirationDate DATE NOT NULL,\n    Status VARCHAR(20) DEFAULT 'Active'\n        CHECK (Status IN ('Active','Lapsed','Cancelled','Expired')),\n    CreatedDate DATETIME2 NOT NULL DEFAULT SYSDATETIME(),\n    CONSTRAINT CK_Dates CHECK (ExpirationDate > EffectiveDate)\n);\n\nCREATE TABLE dbo.Enrollments (\n    EnrollmentID INT IDENTITY(1,1) PRIMARY KEY,\n    ClientID     INT NOT NULL REFERENCES dbo.Clients(ClientID),\n    PolicyID     INT NOT NULL REFERENCES dbo.Policies(PolicyID),\n    AgentID      INT NOT NULL REFERENCES dbo.Agents(AgentID),\n    EnrollmentDate DATE NOT NULL,\n    Status       VARCHAR(20) DEFAULT 'Active',\n    CreatedDate  DATETIME2 NOT NULL DEFAULT SYSDATETIME()\n);\n\nCREATE TABLE dbo.Commissions (\n    CommissionID INT IDENTITY(1,1) PRIMARY KEY,\n    EnrollmentID INT NOT NULL REFERENCES dbo.Enrollments(EnrollmentID),\n    AgentID      INT NOT NULL REFERENCES dbo.Agents(AgentID),\n    Amount       DECIMAL(19,4) NOT NULL,\n    PaymentDate  DATE,\n    Status       VARCHAR(20) DEFAULT 'Pending',\n    CreatedDate  DATETIME2 NOT NULL DEFAULT SYSDATETIME()\n);\n\nCREATE TABLE dbo.Leads (\n    LeadID          INT IDENTITY(1,1) PRIMARY KEY,\n    FirstName       VARCHAR(50) NOT NULL,\n    LastName        VARCHAR(50) NOT NULL,\n    Email           VARCHAR(100), Phone VARCHAR(20),\n    Source          VARCHAR(50),\n    AssignedAgentID INT REFERENCES dbo.Agents(AgentID),\n    Status          VARCHAR(20) DEFAULT 'New',\n    CreatedDate     DATETIME2 NOT NULL DEFAULT SYSDATETIME(),\n    ConvertedDate   DATETIME2\n);\n\n**All Relationships:**\n• Carriers →(1:M)→ Policies\n• Carriers →(M:M via AgentCarriers)→ Agents\n• Agents →(1:M)→ AgentStates\n• Agents →(1:M)→ Enrollments, Leads, Commissions\n• Clients →(1:M)→ Enrollments\n• Policies →(1:M)→ Enrollments\n• Enrollments →(1:M)→ Commissions\n• PolicyTypes →(1:M)→ Policies"}, {"title": "Power BI Fundamentals", "content": "**The JD mentions \"familiarity with BI technologies.\"**\n\n**Two Query Modes:**\n• **Import Mode** — data loaded into Power BI memory. Fast but stale.\n• **DirectQuery** — hits your SQL Server live. Fresh but your DB handles load.\n\n**Example — view optimized for Power BI:**\nCREATE VIEW dbo.vw_PolicyDashboard AS\nSELECT\n    p.PolicyID, p.PolicyNumber, p.PremiumAmount, p.Status,\n    YEAR(p.EffectiveDate) AS PolicyYear,\n    MONTH(p.EffectiveDate) AS PolicyMonth,\n    pt.TypeName AS PolicyType,\n    c.CarrierName,\n    a.FirstName + ' ' + a.LastName AS AgentName,\n    cl.FirstName + ' ' + cl.LastName AS ClientName\nFROM Policies p\nJOIN PolicyTypes pt ON p.PolicyTypeID = pt.PolicyTypeID\nJOIN Carriers c ON p.CarrierID = c.CarrierID\nJOIN Enrollments e ON p.PolicyID = e.PolicyID\nJOIN Agents a ON e.AgentID = a.AgentID\nJOIN Clients cl ON e.ClientID = cl.ClientID;\n\n**What to know:** DAX (formula language), Power Query (ETL layer), Measures vs Calculated Columns. DirectQuery generates complex queries — your indexes must support them.\n\n**Interview Tip:** Show awareness of how DB design supports reporting. Mention star schemas, indexed views for aggregations, and query optimization for report queries."}]}, {"id": 7, "title": "Monitoring & Troubleshooting", "icon": "🔍", "sections": [{"title": "DMVs — Your Diagnostic Toolkit", "content": "**DMVs are how you diagnose SQL Server in production.**\n\n**Top queries by CPU:**\nSELECT TOP 10\n    qs.total_worker_time / qs.execution_count AS avg_cpu,\n    qs.execution_count,\n    qs.total_logical_reads / qs.execution_count AS avg_reads,\n    SUBSTRING(st.text, (qs.statement_start_offset/2)+1,\n        ((CASE qs.statement_end_offset WHEN -1 THEN DATALENGTH(st.text)\n          ELSE qs.statement_end_offset END\n        - qs.statement_start_offset)/2)+1) AS query_text\nFROM sys.dm_exec_query_stats qs\nCROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) st\nORDER BY avg_cpu DESC;\n\n**Missing indexes the optimizer wants:**\nSELECT d.statement AS TableName,\n    d.equality_columns, d.inequality_columns, d.included_columns,\n    gs.avg_user_impact, gs.user_seeks AS TimesMissed\nFROM sys.dm_db_missing_index_details d\nJOIN sys.dm_db_missing_index_groups g ON d.index_handle = g.index_handle\nJOIN sys.dm_db_missing_index_group_stats gs\n    ON g.index_group_handle = gs.group_handle\nORDER BY gs.avg_user_impact * gs.user_seeks DESC;\n\n**Wait Statistics — what is SQL Server waiting on?**\nSELECT TOP 10 wait_type,\n    wait_time_ms / 1000.0 AS wait_sec,\n    wait_time_ms * 100.0 / SUM(wait_time_ms) OVER() AS pct\nFROM sys.dm_os_wait_stats\nWHERE wait_type NOT IN ('SLEEP_TASK','BROKER_TO_FLUSH','WAITFOR',\n    'CLR_AUTO_EVENT','XE_TIMER_EVENT','LAZYWRITER_SLEEP')\nORDER BY wait_time_ms DESC;\n\n**Key Waits:**\n• **PAGEIOLATCH_SH** — disk reads. Need more RAM or faster I/O.\n• **LCK_M_X / LCK_M_S** — lock waits. Blocking problem.\n• **SOS_SCHEDULER_YIELD** — CPU pressure.\n• **CXPACKET** — parallelism. Not always bad.\n• **WRITELOG** — transaction log write delays.\n\n**PerfMon Counters:**\n• Buffer Cache Hit Ratio > 99%\n• Page Life Expectancy — higher = better\n• Batch Requests/sec — workload volume"}, {"title": "Real-World Troubleshooting Scenarios", "content": "**Expect scenario-based questions in the interview.**\n\n**Scenario 1: \"The application is slow\"**\n1. sys.dm_exec_requests — what's running? blocking_session_id?\n2. Get the execution plan\n3. SET STATISTICS IO ON — check logical reads\n4. Look for scans, key lookups, missing indexes\n5. Check stale statistics (estimated vs actual mismatch)\n6. Check wait stats\n\n**Scenario 2: \"Stored proc was fast, now slow\"**\nParameter sniffing:\n1. Compare actual vs estimated rows in plan\n2. Fix:\nEXEC sp_recompile 'dbo.usp_MyProc';\n-- Or: OPTION (RECOMPILE)\n-- Or clear specific plan:\nDECLARE @h VARBINARY(64);\nSELECT @h = plan_handle FROM sys.dm_exec_cached_plans cp\nCROSS APPLY sys.dm_exec_sql_text(cp.plan_handle) t\nWHERE t.text LIKE '%usp_MyProc%';\nDBCC FREEPROCCACHE (@h);\n\n**Scenario 3: \"Deadlocks happening\"**\n1. DBCC TRACEON (1222, -1) or Extended Events\n2. Read deadlock graph — find the two sessions\n3. Fix: same table order, add indexes, shorter txns, RCSI\n\n**Scenario 4: \"tempdb growing\"**\nSELECT\n    SUM(user_object_reserved_page_count)*8/1024 AS UserObj_MB,\n    SUM(internal_object_reserved_page_count)*8/1024 AS Internal_MB,\n    SUM(version_store_reserved_page_count)*8/1024 AS VersionStore_MB\nFROM sys.dm_db_file_space_usage;\n-- Fix root cause. Never just SHRINK (causes fragmentation).\n\n**Scenario 5: \"Deploy schema change\"**\n1. Script it — never GUI in production\n2. Test in dev → test → pre-prod\n3. Wrap in TRY/CATCH + transaction\n4. Include rollback scripts\n5. Check dependencies:\nSELECT referencing_entity_name\nFROM sys.dm_sql_referencing_entities('dbo.Policies', 'OBJECT');\n6. Deploy during low-activity window"}]}, {"id": 8, "title": "Interview Strategy & Cheat Sheet", "icon": "🎯", "sections": [{"title": "2-Hour Interview Game Plan", "content": "**Likely Format:**\n• 20-30 min: Conceptual questions (architecture, design, theory)\n• 30-40 min: Live coding / query writing\n• 20-30 min: Performance tuning scenario\n• 15-20 min: Design exercise (model a schema)\n• 10-15 min: Behavioral / team-fit questions\n\n**When Writing Queries Live:**\n• CLARIFY the question — restate it back\n• Start with the simplest correct answer\n• Talk through your thought process OUT LOUD\n• Then optimize if asked\n\n**When Given a Performance Problem:**\n1. \"First, I'd look at the execution plan\"\n2. \"I'd check STATISTICS IO for logical reads\"\n3. \"I'd look for missing indexes or scans\"\n4. \"I'd check if statistics are current\"\n5. Propose specific fixes with tradeoffs\n\n**Phrases That Impress:**\n• \"That depends on the cardinality of the data...\"\n• \"I'd check the execution plan for a seek vs scan...\"\n• \"The tradeoff is read performance vs write overhead...\"\n• \"I'd use a covering index with INCLUDE to eliminate the key lookup...\"\n• \"I'd recommend RCSI to reduce reader-writer contention...\"\n\n**Company-Specific Prep:**\nIdeal Concepts products: SalesRadix (agent CRM), InsureMe (enrollment), iWebQuotes (quoting).\nThink about: high-volume leads, policy lifecycle, commission calcs, multi-state compliance, open enrollment spikes.\n\n**Questions to ask THEM:**\n• \"What SQL Server version are you on?\"\n• \"How large are your biggest tables?\"\n• \"Do you use Always On AGs?\"\n• \"What's your deployment process for DB changes?\"\n• \"Do you use Query Store?\"\n"}, {"title": "Quick Reference — Must-Know Commands", "content": "**Diagnostics:**\nsp_who2                           -- active sessions\nsp_help 'TableName'               -- table structure\nsp_helpindex 'TableName'          -- indexes\nsp_helptext 'ProcName'            -- source code\nDBCC CHECKDB                      -- integrity\nDBCC SHOW_STATISTICS('Tbl','Idx') -- stats info\nDBCC FREEPROCCACHE                -- clear plans\nDBCC SQLPERF(LOGSPACE)            -- log usage\n\n**System Views:**\nsys.tables, sys.columns, sys.indexes\nsys.procedures, sys.views, sys.triggers\nsys.dm_exec_requests              -- running queries\nsys.dm_exec_sessions              -- connections\nsys.dm_exec_query_stats           -- query perf\nsys.dm_os_wait_stats              -- wait stats\nsys.dm_db_index_usage_stats       -- index usage\nsys.dm_db_missing_index_details   -- wanted indexes\n\n**Date Functions:**\nGETDATE(), SYSDATETIME()\nDATEADD(month, 1, @date)\nDATEDIFF(day, @start, @end)\nEOMONTH(@date)                    -- last day of month\nFORMAT(@date, 'yyyy-MM-dd')\nDATEPART(weekday, @date)\n\n**String Functions:**\nSTRING_AGG(column, ',')           -- SQL 2017+\nCONCAT(a, b, c)                   -- NULL-safe\nCHARINDEX('find', @str)\nSTUFF(@str, start, len, 'new')\nLEFT(@str, n), RIGHT(@str, n)\n\n**JSON (SQL 2016+):**\nFOR JSON PATH\nJSON_VALUE(@json, '$.key')\nOPENJSON(@json)\nISJSON(@json)\n\n**NULL Handling:**\nISNULL(a, default)                -- 2 args\nCOALESCE(a, b, c)                 -- ANSI, multiple\nNULLIF(a, b)                      -- NULL if equal\n\n**Pagination:**\nSELECT * FROM Policies\nORDER BY PolicyID\nOFFSET 20 ROWS FETCH NEXT 10 ROWS ONLY;\n\n**Useful Tricks:**\nSELECT value FROM STRING_SPLIT('Health,Life,Auto', ',');\n\nSELECT TOP 1000 ROW_NUMBER() OVER (ORDER BY (SELECT NULL)) AS n\nFROM sys.objects a CROSS JOIN sys.objects b;\n\nIF OBJECT_ID('dbo.Policies', 'U') IS NOT NULL PRINT 'Exists';"}]}];

let activeChapter=0,activeSection=0,completedSections=new Set();
try{const s=localStorage.getItem('sqlprep-v2');if(s)completedSections=new Set(JSON.parse(s))}catch(e){}
function saveProgress(){try{localStorage.setItem('sqlprep-v2',JSON.stringify([...completedSections]))}catch(e){}}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show')}
function renderSidebar(){const t=chapters.reduce((a,c)=>a+c.sections.length,0);const p=Math.round((completedSections.size/t)*100);let h=`<div class="sidebar-logo"><div class="logo-badge">SQL</div><div class="logo-title">Interview Prep v2</div><div class="logo-sub">Sr. Database Engineer \u2014 Ideal Concepts</div></div><div class="progress-area"><div class="progress-track"><div class="progress-fill" style="width:${p}%"></div></div><div class="progress-label">${completedSections.size}/${t} sections \u00b7 ${p}%</div></div><nav class="nav">`;chapters.forEach((ch,ci)=>{const d=ch.sections.filter((_,si)=>completedSections.has(`${ch.id}-${si}`)).length;h+=`<div class="chapter-item ${ci===activeChapter?'active':''}" onclick="selectChapter(${ci})"><span class="chapter-icon">${ch.icon}</span><div><div class="chapter-title">${ch.title}</div><div class="chapter-meta">${d}/${ch.sections.length} done</div></div></div>`;if(ci===activeChapter){h+=`<div class="section-list">`;ch.sections.forEach((s,si)=>{const dn=completedSections.has(`${ch.id}-${si}`);h+=`<div class="section-item ${si===activeSection?'active':''}" onclick="selectSection(${si})"><span class="check ${dn?'done':''}">${dn?'\u2713':'\u25cb'}</span><span>${s.title}</span></div>`});h+=`</div>`}});h+=`</nav>`;document.getElementById('sidebar').innerHTML=h}
function renderContent(){const ch=chapters[activeChapter],sec=ch.sections[activeSection],key=`${ch.id}-${activeSection}`,done=completedSections.has(key),isFirst=activeChapter===0&&activeSection===0,isLast=activeChapter===chapters.length-1&&activeSection===ch.sections.length-1;document.getElementById('mobileTitle').textContent=`${ch.icon} ${ch.title}`;document.getElementById('content').innerHTML=`<div class="breadcrumb">Chapter ${activeChapter+1} of ${chapters.length} \u2192 Section ${activeSection+1} of ${ch.sections.length}</div><h1 class="page-title">${sec.title}</h1><div class="body-content">${formatContent(sec.content)}</div><div class="footer"><button class="btn btn-outline" onclick="goPrev()" ${isFirst?'disabled':''}>\u2190 Previous</button><button class="btn ${done?'btn-complete':'btn-mark'}" onclick="toggleComplete()">${done?'\u2713 Completed':'Mark Complete'}</button><button class="btn btn-primary" onclick="goNext()" ${isLast?'disabled':''}>Next \u2192</button></div>`;window.scrollTo(0,0);document.querySelector('.main').scrollTo(0,0)}
function formatContent(text){const lines=text.split('\n');let html='';const kw=/^(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|FULL|CROSS|GROUP|ORDER|HAVING|INSERT|UPDATE|DELETE|CREATE|ALTER|DROP|MERGE|WITH|SET|BEGIN|END|IF|ELSE|DECLARE|EXEC|RETURN|THROW|UNION|PIVOT|CASE|WHEN|THEN|INTO|VALUES|ON|AS|AND|OR|NOT|IN|EXISTS|BETWEEN|LIKE|OPTION|USING|MATCHED|OFFSET|FETCH|GO|USE|DBCC|BACKUP|RESTORE|RETURNS|TABLE|PRINT|RAISERROR|OUTPUT|CONSTRAINT|CHECK|ADD|REFERENCES|DEFAULT|UNIQUE|IDENTITY|INDEX)/i;const ik=/^\s{2,}(SELECT|FROM|WHERE|JOIN|SET|AND|OR|WHEN|THEN|ELSE|END|ON|ORDER|GROUP|HAVING|\(|,|--|\)|INTO|VALUES|AS|RETURN|CASE|INSERT|UPDATE|DELETE|CROSS|OUTER|UNION|USING|NOT|OPTION|ROWS|BETWEEN|ADD|WITH|LIKE|CHECK|CONSTRAINT|REFERENCES|DEFAULT|PRINT)/i;for(const line of lines){if(line.startsWith('**')&&line.endsWith('**'))html+=`<h3>${line.replace(/\*\*/g,'')}</h3>`;else if(line.match(/^\u2022 /))html+=`<div class="bullet"><span class="bullet-dot">\u2192</span><span>${ib(line.substring(2))}</span></div>`;else if(line.match(/^-- /))html+=`<div class="comment-line">${esc(line)}</div>`;else if((line.trim().match(kw)&&!line.startsWith('\u2022'))||line.trim().match(ik))html+=`<div class="code-line">${esc(line)}</div>`;else if(line.trim()==='')html+=`<div class="spacer"></div>`;else html+=`<p>${ib(line)}</p>`}return html}
function ib(t){return esc(t).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function selectChapter(ci){activeChapter=ci;activeSection=0;render();closeSidebar()}
function selectSection(si){activeSection=si;render();closeSidebar()}
function goNext(){const ch=chapters[activeChapter];if(activeSection<ch.sections.length-1)activeSection++;else if(activeChapter<chapters.length-1){activeChapter++;activeSection=0}render()}
function goPrev(){if(activeSection>0)activeSection--;else if(activeChapter>0){activeChapter--;activeSection=chapters[activeChapter].sections.length-1}render()}
function toggleComplete(){const key=`${chapters[activeChapter].id}-${activeSection}`;if(completedSections.has(key))completedSections.delete(key);else completedSections.add(key);saveProgress();render()}
function render(){renderSidebar();renderContent()}
render();
</script>
</body>
