*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,body.light{--bg:#f8f9fa;--bg2:#ffffff;--bg3:#f1f3f5;--bg4:#e9ecef;--border:#dee2e6;--border2:#ced4da;--text:#343a40;--text2:#6c757d;--text3:#adb5bd;--heading:#1a1a2e;--subheading:#2d2d44;--accent:#3b82f6;--accent2:#7c3aed;--accent3:#6366f1;--green:#059669;--green2:#10b981;--green-bg:#d1fae5;--code-bg:#f0f4f8;--code-text:#1e6f3f;--h3-color:#6d28d9}
body.dark{--bg:#0c0e13;--bg2:#12151c;--bg3:#1a1d27;--bg4:#1e2230;--border:#1e2230;--border2:#2d3348;--text:#c8ccd4;--text2:#9ca3af;--text3:#6b7280;--heading:#f1f3f7;--subheading:#e2e5eb;--accent:#3b82f6;--accent2:#8b5cf6;--accent3:#6366f1;--green:#10b981;--green2:#34d399;--green-bg:#064e3b;--code-bg:#161921;--code-text:#a5f3a0;--h3-color:#a5b4fc}
body.dark .btn-complete{background:var(--green-bg);color:var(--green2)}
body.light .btn-complete{background:var(--green-bg);color:var(--green2)}
html{font-size:16px;scroll-behavior:smooth}body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow:hidden}
.sidebar{width:300px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:100;transition:transform .25s ease}.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid var(--border)}.logo-badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:800;font-size:.8rem;padding:4px 10px;border-radius:6px;letter-spacing:1.5px}.logo-title{font-size:1.06rem;font-weight:700;color:var(--subheading);margin-top:8px;line-height:1.2}.logo-sub{font-size:.75rem;color:var(--text3);margin-top:2px}.progress-area{padding:14px 20px;border-bottom:1px solid var(--border)}.progress-track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .35s ease}.progress-label{font-size:.68rem;color:var(--text3);margin-top:6px}.nav{flex:1;overflow-y:auto;padding:8px 0}.nav::-webkit-scrollbar{width:4px}.nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}.chapter-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;border-left:3px solid transparent;transition:background .15s}.chapter-item:hover{background:var(--bg3)}.chapter-item.active{background:var(--bg3);border-left-color:var(--accent)}.chapter-icon{font-size:1.12rem;width:28px;text-align:center;flex-shrink:0}.chapter-title{font-size:.81rem;font-weight:600;color:var(--subheading);line-height:1.3}.chapter-meta{font-size:.68rem;color:var(--text3);margin-top:1px}.section-list{padding-bottom:4px}.section-item{display:flex;align-items:center;gap:8px;padding:6px 20px 6px 56px;cursor:pointer;font-size:.75rem;color:var(--text2);transition:all .15s}.section-item:hover{color:var(--subheading);background:rgba(255,255,255,.02)}.section-item.active{color:var(--subheading);background:var(--bg4)}.check{font-size:.75rem;color:var(--border2);width:16px;flex-shrink:0}.check.done{color:var(--green)}
.main{margin-left:300px;flex:1;overflow-y:auto;height:100vh}.content{max-width:820px;margin:0 auto;padding:40px 32px 60px;width:100%}.breadcrumb{font-size:.72rem;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}.page-title{font-size:1.75rem;font-weight:800;color:var(--heading);margin-bottom:28px;line-height:1.25;letter-spacing:-.5px}.body-content{line-height:1.7}.body-content h3{font-size:1rem;font-weight:700;color:var(--h3-color);margin:24px 0 10px}.body-content p{margin:0 0 8px;font-size:.875rem;line-height:1.75}.body-content strong{color:var(--subheading);font-weight:600}.body-content .bullet{display:flex;gap:8px;margin:4px 0;font-size:.875rem;line-height:1.65;padding-left:4px}.body-content .bullet-dot{color:var(--accent);flex-shrink:0}.body-content .code-line{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--code-text);background:var(--code-bg);padding:2px 10px;margin:1px 0;border-left:2px solid var(--border2);white-space:pre-wrap;line-height:1.6}.body-content .comment-line{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text3);font-style:italic;padding:2px 10px;margin:1px 0}.body-content .spacer{height:12px}
.footer{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:40px;padding-top:24px;border-top:1px solid var(--border);flex-wrap:wrap}.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.81rem;font-weight:600;font-family:inherit;transition:all .15s}.btn:active{transform:scale(.97)}.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff}.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}.btn-mark{background:var(--bg4);color:var(--text2)}.btn-complete{background:var(--green-bg);color:var(--green2)}.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.mobile-header{display:none;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);align-items:center;gap:12px;position:sticky;top:0;z-index:10}.menu-btn{background:none;border:1px solid var(--border2);color:var(--subheading);font-size:1.12rem;padding:4px 10px;border-radius:6px;cursor:pointer}.mobile-title{font-size:.875rem;font-weight:600;color:var(--subheading)}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;display:none}.overlay.show{display:block}
.visual-block{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:20px;margin:20px 0}.vis-title{font-size:.85rem;font-weight:700;color:var(--h3-color);margin-bottom:14px}.vis-row{display:flex;gap:12px;flex-wrap:wrap}.vis-card{flex:1;min-width:160px;background:var(--bg4);border-radius:8px;padding:12px;text-align:center}.vis-card svg{max-height:55px;margin-bottom:6px}.vis-label{font-size:.8rem;font-weight:600;color:var(--subheading);margin-bottom:2px}.vis-desc{font-size:.7rem;color:var(--text3)}.vis-sym{display:inline-flex;align-items:center;gap:6px;margin-right:18px;font-size:.75rem;color:var(--text2)}.vis-sym svg{flex-shrink:0}
.rel-table{width:100%;border-collapse:collapse;font-size:.78rem}.rel-table th{text-align:left;padding:8px 10px;color:var(--text3);border-bottom:1px solid var(--border2);font-weight:600;text-transform:uppercase;font-size:.68rem;letter-spacing:.5px}.rel-table td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text)}.rel-table tr:hover td{background:var(--bg3)}.rel-1m{color:var(--accent);font-weight:600;font-family:'JetBrains Mono',monospace;font-size:.72rem}.rel-mm{color:var(--accent2);font-weight:600;font-family:'JetBrains Mono',monospace;font-size:.72rem}
.erd-box{background:var(--bg2);border-radius:8px;padding:16px;min-height:200px;overflow-x:auto}.erd-loading{color:var(--text3);font-size:.8rem;text-align:center;padding:40px 0}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.mobile-header{display:flex}.content{padding:24px 16px 60px}.page-title{font-size:1.35rem}.vis-card{min-width:130px}}
.theme-toggle{position:fixed;bottom:20px;right:20px;z-index:200;width:44px;height:44px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.15)}.theme-toggle:hover{transform:scale(1.1);border-color:var(--accent)}
</style>

<main class="main" id="main"><div class="mobile-header"><button class="menu-btn" onclick="openSidebar()">&#9776;</button><span class="mobile-title" id="mobileTitle"></span></div><div class="content" id="content"></div></main>
<script>
const chapters=[{"id": 1, "title": "SQL Server Foundations", "icon": "🏗️", "sections": [{"title": "SQL Server Architecture", "content": "**How SQL Server Works Under the Hood**\n\nSQL Server is a relational database management system (RDBMS). When a query hits SQL Server, here’s the pipeline:\n\n• **Protocol Layer (TDS)** — receives the query via Tabular Data Stream protocol\n• **Query Parser** — checks syntax, builds a parse tree\n• **Algebrizer** — resolves names (tables, columns), type checking\n• **Query Optimizer** — generates execution plan (cost-based)\n• **Execution Engine** — runs the plan step by step\n• **Storage Engine** — reads/writes via Buffer Pool\n\n**Key Memory Components:**\n• **Buffer Pool** — cached 8KB data pages in RAM\n• **Plan Cache** — stores compiled execution plans\n• **Log Buffer** — write-ahead log entries\n\n**Example — checking buffer pool usage:**\nSELECT DB_NAME(database_id) AS DatabaseName,\n    COUNT(*) * 8 / 1024 AS CachedSize_MB\nFROM sys.dm_os_buffer_descriptors\nGROUP BY database_id\nORDER BY CachedSize_MB DESC;\n\n**Interview Tip:** Walk through this full 6-stage pipeline when asked \"what happens when you run a SELECT.\""}, {"title": "Data Types — What to Use When", "content": "**Choosing the right data type is a design question they WILL ask.**\n\n**Numeric Types:**\n• **INT** (4 bytes) — most common for IDs. Range: -2.1B to 2.1B\n• **BIGINT** (8 bytes) — when INT isn't enough\n• **DECIMAL(p,s)** — exact precision for money. NEVER use FLOAT for money!\n• **BIT** — boolean (0/1/NULL)\n• **MONEY** — avoid. Use DECIMAL(19,4). MONEY has rounding bugs.\n\n**Example — MONEY rounding bug:**\nDECLARE @m1 MONEY = 1.00, @m2 MONEY = 3.00;\nSELECT @m1 / @m2 * @m2;\n-- Returns 0.9999, not 1.0000!\n\n**String Types:**\n• **VARCHAR(n)** — variable-length, non-Unicode (1 byte/char)\n• **NVARCHAR(n)** — Unicode (2 bytes/char). International characters.\n• **CHAR(n)** — fixed-length. Only for codes like CHAR(2) state.\n\n**Example — implicit conversion trap:**\n-- BAD: @name is NVARCHAR but column is VARCHAR\nDECLARE @name NVARCHAR(50) = N'Smith';\nSELECT * FROM Agents WHERE LastName = @name;\n-- Converts EVERY row! Use VARCHAR instead.\n\n**Date Types:**\n• **DATE** — date only (3 bytes). Use for DOB.\n• **DATETIME2(7)** — preferred over DATETIME\n• **DATETIMEOFFSET** — includes timezone"}, {"title": "Tables, Constraints & Normalization", "content": "**Table Design is the foundation of everything.**\n\n**Example — table with ALL constraint types:**\nCREATE TABLE dbo.Policies (\n    PolicyID      INT IDENTITY(1,1) PRIMARY KEY,\n    PolicyNumber  VARCHAR(20) NOT NULL UNIQUE,\n    CarrierID     INT NOT NULL\n        REFERENCES dbo.Carriers(CarrierID),\n    PremiumAmount DECIMAL(19,4) NOT NULL\n        CHECK (PremiumAmount >= 0),\n    Status        VARCHAR(20) NOT NULL\n        DEFAULT 'Active'\n        CHECK (Status IN ('Active','Lapsed','Cancelled')),\n    EffectiveDate DATE NOT NULL,\n    ExpirationDate DATE NOT NULL,\n    CONSTRAINT CK_DateRange CHECK (ExpirationDate > EffectiveDate)\n);\n\n**Normalization:**\n• **1NF** — No repeating groups. Atomic values.\n• **2NF** — No partial dependencies\n• **3NF** — No transitive dependencies\n• **BCNF** — Every determinant is a candidate key\n\n**When to DENORMALIZE:** Reporting, expensive JOINs, data warehousing."}]}, {"id": 2, "title": "T-SQL Mastery", "icon": "⚡", "sections": [{"title": "Joins — The Complete Picture", "content": "**Every interview tests JOIN knowledge.**\n\n-- INNER JOIN: only matching rows\nSELECT a.AgentName, p.PolicyNumber\nFROM Agents a\nINNER JOIN Policies p ON a.AgentID = p.AgentID;\n\n-- LEFT JOIN: ALL agents, even without policies\nSELECT a.AgentName, p.PolicyNumber\nFROM Agents a\nLEFT JOIN Policies p ON a.AgentID = p.AgentID;\n\n-- Anti-join: agents WITHOUT policies\nSELECT a.AgentName\nFROM Agents a\nLEFT JOIN Policies p ON a.AgentID = p.AgentID\nWHERE p.PolicyID IS NULL;\n\n**CROSS APPLY — Top 3 policies per agent:**\nSELECT a.AgentName, p.PolicyNumber, p.EffectiveDate\nFROM Agents a\nCROSS APPLY (\n    SELECT TOP 3 PolicyNumber, EffectiveDate\n    FROM Policies\n    WHERE Policies.AgentID = a.AgentID\n    ORDER BY EffectiveDate DESC\n) p;"}, {"title": "Window Functions", "content": "**Ranking functions compared:**\nSELECT AgentName, TotalSales,\n    ROW_NUMBER() OVER (ORDER BY TotalSales DESC) AS RowNum,\n    RANK()       OVER (ORDER BY TotalSales DESC) AS Rnk,\n    DENSE_RANK() OVER (ORDER BY TotalSales DESC) AS DenseRnk\nFROM AgentSales;\n\n**Running total:**\nSELECT PolicyID, Premium,\n    SUM(Premium) OVER (\n        ORDER BY EffectiveDate\n        ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n    ) AS RunningTotal\nFROM Policies;\n\n**LAG/LEAD:**\nSELECT PolicyID, Premium,\n    LAG(Premium, 1) OVER (ORDER BY EffectiveDate) AS Prev,\n    Premium - LAG(Premium, 1) OVER (ORDER BY EffectiveDate) AS Change\nFROM Policies;\n\n**Top N per group:**\nWITH Ranked AS (\n    SELECT AgentID, PolicyNumber, Premium,\n        ROW_NUMBER() OVER (PARTITION BY AgentID ORDER BY Premium DESC) AS rn\n    FROM Policies\n)\nSELECT * FROM Ranked WHERE rn <= 3;"}, {"title": "CTEs, Subqueries & Temp Tables", "content": "**Recursive CTE — Org Chart:**\nWITH OrgChart AS (\n    SELECT EmpID, Name, ManagerID, 0 AS Level\n    FROM Employees WHERE ManagerID IS NULL\n    UNION ALL\n    SELECT e.EmpID, e.Name, e.ManagerID, oc.Level + 1\n    FROM Employees e\n    JOIN OrgChart oc ON e.ManagerID = oc.EmpID\n)\nSELECT * FROM OrgChart ORDER BY Level;\n\n**Decision Framework:**\n• Need it once, readable → CTE\n• Large data, multiple refs → #temp table\n• Small lookup < 1000 rows → @table variable\n• Hierarchical → Recursive CTE"}, {"title": "Advanced T-SQL Patterns", "content": "**MERGE (Upsert):**\nMERGE INTO dbo.Policies AS t\nUSING dbo.StagingPolicies AS s ON t.PolicyNumber = s.PolicyNumber\nWHEN MATCHED THEN\n    UPDATE SET t.PremiumAmount = s.PremiumAmount\nWHEN NOT MATCHED BY TARGET THEN\n    INSERT (PolicyNumber, CarrierID, PremiumAmount)\n    VALUES (s.PolicyNumber, s.CarrierID, s.PremiumAmount)\nWHEN NOT MATCHED BY SOURCE THEN DELETE;\n\n**PIVOT:**\nSELECT AgentID, [Health], [Life], [Auto]\nFROM (SELECT AgentID, InsuranceType, Premium FROM Policies) src\nPIVOT (SUM(Premium) FOR InsuranceType IN ([Health],[Life],[Auto])) pvt;\n\n**TRY...CATCH:**\nBEGIN TRY\n    BEGIN TRANSACTION;\n    UPDATE Policies SET Status = 'Cancelled' WHERE PolicyID = @id;\n    COMMIT;\nEND TRY\nBEGIN CATCH\n    IF @@TRANCOUNT > 0 ROLLBACK;\n    THROW;\nEND CATCH;\n\n**GROUPING SETS:**\nSELECT State, InsuranceType, SUM(Premium) AS Total\nFROM Policies\nGROUP BY GROUPING SETS ((State, InsuranceType), (State), ());"}]}, {"id": 3, "title": "Stored Procedures & Programming", "icon": "🔧", "sections": [{"title": "Stored Procedure Design", "content": "**Complete production stored procedure:**\nCREATE OR ALTER PROCEDURE dbo.usp_GetAgentPolicies\n    @AgentID INT,\n    @StartDate DATE = NULL,\n    @TotalPremium DECIMAL(19,4) OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET XACT_ABORT ON;\n\n    IF @AgentID IS NULL\n    BEGIN\n        RAISERROR('AgentID cannot be NULL', 16, 1);\n        RETURN -1;\n    END;\n\n    SELECT PolicyID, PolicyNumber, Premium\n    FROM dbo.Policies\n    WHERE AgentID = @AgentID\n      AND (@StartDate IS NULL OR EffectiveDate >= @StartDate)\n    ORDER BY EffectiveDate DESC;\n\n    SELECT @TotalPremium = SUM(Premium)\n    FROM dbo.Policies WHERE AgentID = @AgentID;\nEND;\n\n**Calling it:**\nDECLARE @total DECIMAL(19,4);\nEXEC dbo.usp_GetAgentPolicies @AgentID=42, @TotalPremium=@total OUTPUT;\nSELECT @total AS TotalPremium;\n\n**Parameter Sniffing Fixes:**\n• OPTION (RECOMPILE)\n• OPTIMIZE FOR (@AgentID = 100)\n• OPTIMIZE FOR UNKNOWN\n• Local variable copy"}, {"title": "Procedures vs Functions", "content": "**This is a classic interview question. Know every difference.**\n\n**The core difference:**\n• **Procedure** = verb (does things). Can modify data, return multiple results, handle errors.\n• **Function** = expression (computes things). Returns a value, can be used inside queries, no side effects.\n\n**Side-by-side comparison:**\n\n• **Return type:** Procedure returns result sets + output params + status code. Function returns a single value (scalar) or a table (TVF).\n• **Use in SELECT:** Procedure — NO. Cannot appear in SELECT/WHERE/JOIN. Function — YES. Can be used anywhere an expression is valid.\n• **Side effects:** Procedure — YES. Can INSERT, UPDATE, DELETE, send mail, call other procs. Function — NO. Cannot modify any state.\n• **Error handling:** Procedure — full TRY...CATCH, RAISERROR, THROW. Function — NO TRY...CATCH allowed.\n• **Transactions:** Procedure — can manage explicit transactions. Function — cannot. Participates in caller's transaction.\n• **Temp tables:** Procedure — YES. Function — NO (only table variables).\n• **Performance:** Procedure — full optimizer support, parallelism. Scalar UDF — row-by-row (slow!). Inline TVF — fast (optimizer inlines).\n\n**Example — Procedure (does things):**\nCREATE PROCEDURE dbo.usp_CancelPolicy @PolicyID INT\nAS BEGIN\n    SET NOCOUNT ON;\n    BEGIN TRY\n        BEGIN TRANSACTION;\n        UPDATE Policies SET Status = 'Cancelled' WHERE PolicyID = @PolicyID;\n        INSERT INTO AuditLog VALUES ('Cancel', @PolicyID, GETDATE());\n        COMMIT;\n    END TRY\n    BEGIN CATCH\n        ROLLBACK; THROW;\n    END CATCH\nEND;\n\n-- Call it:\nEXEC dbo.usp_CancelPolicy @PolicyID = 42;\n\n**Example — Function (computes things):**\nCREATE FUNCTION dbo.fn_GetPremiumTotal(@AgentID INT)\nRETURNS DECIMAL(19,4) AS\nBEGIN\n    RETURN (SELECT SUM(Premium) FROM Policies WHERE AgentID = @AgentID);\nEND;\n\n-- Use it INSIDE a query (procedure can't do this):\nSELECT AgentName, dbo.fn_GetPremiumTotal(AgentID) AS Total\nFROM Agents;\n\n-- Use it in a WHERE clause:\nSELECT * FROM Agents\nWHERE dbo.fn_GetPremiumTotal(AgentID) > 10000;\n\n-- Use it in a computed column:\nALTER TABLE Agents ADD TotalPremium AS dbo.fn_GetPremiumTotal(AgentID);\n\n**When to use which:**\n• Need to modify data → Procedure\n• Need error handling/transactions → Procedure\n• Need to call it from SELECT/WHERE → Function\n• Need it in a CHECK constraint → Function\n• Need it in a computed column → Function\n• Complex business operation → Procedure\n• Reusable calculation → Function (prefer Inline TVF)\n\n**Interview answer:** \"A procedure is for doing things — it can modify data, return multiple results, and handle errors. A function is for computing things — it returns a value, can be used inside queries, but can't modify state. I prefer inline TVFs over scalar UDFs because the optimizer can inline them.\""}, {"title": "Views, Functions & Triggers", "content": "**3 UDF types — performance ranking:**\n\n**1. Scalar UDF (SLOW — once per row!):**\nCREATE FUNCTION dbo.fn_CalcAge(@DOB DATE)\nRETURNS INT AS\nBEGIN\n    RETURN DATEDIFF(YEAR, @DOB, GETDATE()) -\n        CASE WHEN DATEADD(YEAR, DATEDIFF(YEAR, @DOB, GETDATE()), @DOB)\n            > GETDATE() THEN 1 ELSE 0 END;\nEND;\n\n**2. Inline TVF (FAST — optimizer inlines it):**\nCREATE FUNCTION dbo.fn_GetAgentPolicies(@AgentID INT)\nRETURNS TABLE AS RETURN\n    SELECT PolicyID, Premium FROM Policies WHERE AgentID = @AgentID;\n\n**3. Multi-Statement TVF (medium):**\nCREATE FUNCTION dbo.fn_Summary(@AgentID INT)\nRETURNS @r TABLE (Cnt INT, Total DECIMAL(19,4))\nAS BEGIN\n    INSERT INTO @r SELECT COUNT(*), SUM(Premium)\n    FROM Policies WHERE AgentID = @AgentID;\n    RETURN;\nEND;\n\n**Ranking:** Inline TVF > Computed column > Subquery > Multi-stmt TVF > Scalar UDF\n\n**Trigger with audit:**\nCREATE TRIGGER dbo.trg_Audit ON dbo.Policies AFTER UPDATE AS\nBEGIN\n    SET NOCOUNT ON;\n    INSERT INTO AuditLog (TableName, RecordID, OldVal, NewVal)\n    SELECT 'Policies', i.PolicyID,\n        CAST(d.PremiumAmount AS VARCHAR), CAST(i.PremiumAmount AS VARCHAR)\n    FROM inserted i JOIN deleted d ON i.PolicyID = d.PolicyID\n    WHERE i.PremiumAmount <> d.PremiumAmount;\nEND;"}]}, {"id": 4, "title": "Indexing & Performance Tuning", "icon": "🚀", "sections": [{"title": "Index Types Deep Dive", "content": "**Example — optimal covering index:**\n-- For this query:\nSELECT PolicyNumber, Premium FROM Policies\nWHERE AgentID = 42 AND Status = 'Active'\nORDER BY EffectiveDate DESC;\n\n-- Create:\nCREATE NONCLUSTERED INDEX IX_Policies_Agent\nON Policies (AgentID, Status, EffectiveDate DESC)\nINCLUDE (PolicyNumber, Premium);\n-- Key cols = filter/sort. INCLUDE = SELECT cols. No Key Lookup!\n\n**Filtered Index:**\nCREATE INDEX IX_Active\nON Policies (AgentID, EffectiveDate)\nINCLUDE (PolicyNumber, Premium)\nWHERE Status = 'Active';\n\n**Find unused indexes:**\nSELECT i.name, s.user_seeks, s.user_scans, s.user_updates\nFROM sys.indexes i\nJOIN sys.dm_db_index_usage_stats s\n    ON i.object_id = s.object_id AND i.index_id = s.index_id\nWHERE s.user_seeks + s.user_scans + s.user_lookups = 0\nORDER BY s.user_updates DESC;\n\n**Maintenance:**\n-- < 10%: nothing. 10-30%: REORGANIZE. > 30%: REBUILD\nALTER INDEX IX_Policies_Agent ON Policies REORGANIZE;\nALTER INDEX IX_Policies_Agent ON Policies REBUILD WITH (ONLINE = ON);"}, {"title": "Reading Execution Plans", "content": "**Example — diagnosing a slow query:**\nSET STATISTICS IO ON;\nSELECT PolicyNumber, Premium FROM Policies WHERE AgentID = 42;\n-- Output: logical reads 15234 (reading whole table!)\n-- Plan: Clustered Index SCAN\n\n-- Fix: add covering index\nCREATE INDEX IX_Agent ON Policies (AgentID) INCLUDE (PolicyNumber, Premium);\n\n-- Re-run: logical reads 3. 5000x faster!\n-- Plan: Index SEEK\n\n**Key Operators:**\n• **Index Seek** — O(log n). THE GOAL.\n• **Index Scan** — reads entire index. Caution on large tables.\n• **Table Scan** — reads EVERY row. BAD.\n• **Key Lookup** — extra I/O per row. Fix with INCLUDE.\n• **Nested Loop** — good for small outer + indexed inner\n• **Hash Match** — large unsorted joins\n• **Merge Join** — pre-sorted large inputs\n\n**Golden Rule:** Optimize **logical reads**. Fewer pages = faster."}, {"title": "Query Optimization", "content": "**SARGability:**\n-- BAD (non-SARGable):\nWHERE YEAR(EffectiveDate) = 2025\nWHERE LastName LIKE '%son'\n\n-- GOOD (SARGable):\nWHERE EffectiveDate >= '2025-01-01' AND EffectiveDate < '2026-01-01'\nWHERE LastName LIKE 'John%'\n\n**NOT IN vs NOT EXISTS:**\n-- BAD: NOT IN fails with NULLs!\nSELECT * FROM Agents\nWHERE AgentID NOT IN (SELECT AgentID FROM Policies);\n\n-- GOOD: NULL-safe\nSELECT * FROM Agents a\nWHERE NOT EXISTS (\n    SELECT 1 FROM Policies p WHERE p.AgentID = a.AgentID\n);\n\n**Replace cursors with set-based:**\n-- BAD: cursor row-by-row\n-- GOOD: single UPDATE\nUPDATE Policies SET Premium = Premium * 1.05;\n\n**Query Store:**\nALTER DATABASE InsuranceDB SET QUERY_STORE = ON;"}, {"title": "Blocking, Deadlocks & Concurrency", "content": "**Detect blocking:**\nSELECT r.session_id, r.blocking_session_id, r.wait_type,\n    t.text AS query_text\nFROM sys.dm_exec_requests r\nCROSS APPLY sys.dm_exec_sql_text(r.sql_handle) t\nWHERE r.blocking_session_id > 0;\n\n**Deadlock fix: access tables in SAME order**\n\n**Isolation Levels:**\n• **READ UNCOMMITTED** — dirty reads (NOLOCK)\n• **READ COMMITTED** — default\n• **RCSI** — readers never block writers!\n• **REPEATABLE READ** — locks until txn end\n• **SERIALIZABLE** — max blocking\n• **SNAPSHOT** — optimistic via row versioning\n\n**Enable RCSI:**\nALTER DATABASE InsuranceDB SET READ_COMMITTED_SNAPSHOT ON;\n\n**Deadlock detection:**\nDBCC TRACEON (1222, -1);"}]}, {"id": 5, "title": "SSIS & DB Administration", "icon": "📦", "sections": [{"title": "SSIS Packages — ETL", "content": "**Common Scenario: \"Load daily vendor file\"**\n1. Foreach Loop → iterate files in folder\n2. Data Flow Task:\n   a. Flat File Source → read CSV\n   b. Data Conversion → fix types\n   c. Lookup → validate CarrierID\n   d. Conditional Split → valid vs invalid\n   e. OLE DB Destination → staging table\n   f. Error Output → error table\n3. Execute SQL → MERGE staging into production\n4. Send Mail (on failure) → alert team\n\n**Control Flow tasks:** Execute SQL, Data Flow, Script Task, Foreach Loop, Send Mail\n**Data Flow:** Sources (OLE DB, Flat File) → Transforms (Derived Column, Lookup, Conditional Split) → Destinations\n\n**Performance Tips:**\n• SQL Server Destination fastest (on server)\n• Tune DefaultBufferMaxRows\n• Use staging + MERGE over row-by-row"}, {"title": "SQL Server Agent", "content": "**Nightly maintenance job steps:**\n-- Step 1: Update statistics\nEXEC sp_updatestats;\n\n-- Step 2: Rebuild fragmented indexes\nDECLARE @sql NVARCHAR(MAX) = '';\nSELECT @sql += 'ALTER INDEX ' + i.name + ' ON ' + OBJECT_NAME(i.object_id)\n    + CASE WHEN ps.avg_fragmentation_in_percent > 30\n        THEN ' REBUILD; ' ELSE ' REORGANIZE; ' END\nFROM sys.indexes i\nCROSS APPLY sys.dm_db_index_physical_stats(\n    DB_ID(), i.object_id, i.index_id, NULL, 'LIMITED') ps\nWHERE ps.avg_fragmentation_in_percent > 10 AND i.name IS NOT NULL;\nEXEC sp_executesql @sql;\n\n-- Step 3: Integrity check\nDBCC CHECKDB ('InsuranceDB') WITH NO_INFOMSGS;\n\n**Database Mail:**\nEXEC msdb.dbo.sp_send_dbmail\n    @profile_name = 'DBMailProfile',\n    @recipients = 'dba@idealconcepts.com',\n    @subject = 'Job Failed';"}, {"title": "Backup & Recovery", "content": "**Backup Examples:**\nBACKUP DATABASE InsuranceDB TO DISK = 'Full.bak' WITH COMPRESSION, CHECKSUM;\nBACKUP DATABASE InsuranceDB TO DISK = 'Diff.bak' WITH DIFFERENTIAL;\nBACKUP LOG InsuranceDB TO DISK = 'Log.trn' WITH COMPRESSION;\n\n**Point-in-Time Restore:**\nRESTORE DATABASE InsuranceDB FROM DISK = 'Full.bak' WITH NORECOVERY;\nRESTORE DATABASE InsuranceDB FROM DISK = 'Diff.bak' WITH NORECOVERY;\nRESTORE LOG InsuranceDB FROM DISK = 'Log.trn'\n    WITH STOPAT = '2025-06-15T14:30:00', RECOVERY;\n\n**HA Options:**\n• **Always On AG** — auto failover, readable secondaries\n• **Log Shipping** — simple, low cost\n• **Failover Cluster** — OS-level, shared storage"}]}, {"id": 6, "title": "Database Design & ER Diagrams", "icon": "📐", "sections": [{"title": "Schema Design Patterns", "content": "**OLTP:** Normalized 3NF, optimized for writes.\n**OLAP:** Denormalized star schema, optimized for aggregations.\n\n**Star Schema:**\nCREATE TABLE Fact_PolicyTransactions (\n    TransactionID INT IDENTITY PRIMARY KEY,\n    DateKey INT REFERENCES Dim_Date(DateKey),\n    AgentKey INT REFERENCES Dim_Agent(AgentKey),\n    PremiumAmount DECIMAL(19,4),\n    PolicyCount INT DEFAULT 1\n);\n\n**Slowly Changing Dimensions:**\n• **Type 1** — overwrite (no history)\n• **Type 2** — new row with StartDate/EndDate/IsCurrent\n• **Type 3** — add PreviousValue column"}, {"title": "ERD Relationship Types", "content": "**Three relationship types you must know.**\n\n[VIS:CROWSFOOT]\n\n**1. One-to-One (1:1) — rare:**\nCREATE TABLE AgentProfiles (\n    ProfileID INT PRIMARY KEY,\n    AgentID   INT NOT NULL UNIQUE\n        REFERENCES Agents(AgentID),\n    Bio NVARCHAR(MAX)\n);\n-- UNIQUE on FK makes it 1:1.\n\n**2. One-to-Many (1:M) — most common:**\nCREATE TABLE Policies (\n    PolicyID  INT PRIMARY KEY,\n    CarrierID INT NOT NULL\n        REFERENCES Carriers(CarrierID)\n);\n-- FK on the \"many\" side.\n\n**3. Many-to-Many (M:M) — junction table:**\nCREATE TABLE AgentCarriers (\n    AgentCarrierID INT IDENTITY PRIMARY KEY,\n    AgentID   INT NOT NULL REFERENCES Agents(AgentID),\n    CarrierID INT NOT NULL REFERENCES Carriers(CarrierID),\n    CommissionRate DECIMAL(5,4),\n    StartDate DATE NOT NULL,\n    CONSTRAINT UQ_AC UNIQUE (AgentID, CarrierID, StartDate)\n);\n\n**Interview tip:** \"How do you implement M:M?\" → Junction table with FKs to both sides plus relationship attributes."}, {"title": "Insurance Domain Schema", "content": "[VIS:ERD_MERMAID]\n\n**Complete schema for Ideal Concepts (11 tables):**\n\nCREATE TABLE dbo.Carriers (\n    CarrierID INT IDENTITY(1,1) PRIMARY KEY,\n    CarrierName VARCHAR(100) NOT NULL UNIQUE,\n    CarrierCode VARCHAR(20) NOT NULL UNIQUE,\n    IsActive BIT NOT NULL DEFAULT 1,\n    CreatedDate DATETIME2 NOT NULL DEFAULT SYSDATETIME(),\n    ModifiedDate DATETIME2 NOT NULL DEFAULT SYSDATETIME()\n);\n\nCREATE TABLE dbo.Agents (\n    AgentID INT IDENTITY(1,1) PRIMARY KEY,\n    FirstName VARCHAR(50) NOT NULL,\n    LastName VARCHAR(50) NOT NULL,\n    Email VARCHAR(100) NOT NULL UNIQUE,\n    GovIssuedID VARCHAR(50),\n    IsActive BIT NOT NULL DEFAULT 1,\n    CreatedDate DATETIME2 NOT NULL DEFAULT SYSDATETIME(),\n    ModifiedDate DATETIME2 NOT NULL DEFAULT SYSDATETIME()\n);\n\nCREATE TABLE dbo.AgentStates (\n    AgentStateID INT IDENTITY(1,1) PRIMARY KEY,\n    AgentID INT NOT NULL REFERENCES dbo.Agents(AgentID),\n    StateCode CHAR(2) NOT NULL,\n    LicenseNumber VARCHAR(50),\n    ExpirationDate DATE,\n    CONSTRAINT UQ_AgentState UNIQUE (AgentID, StateCode)\n);\n\nCREATE TABLE dbo.AgentCarriers (\n    AgentCarrierID INT IDENTITY(1,1) PRIMARY KEY,\n    AgentID INT NOT NULL REFERENCES dbo.Agents(AgentID),\n    CarrierID INT NOT NULL REFERENCES dbo.Carriers(CarrierID),\n    CommissionRate DECIMAL(5,4) CHECK (CommissionRate BETWEEN 0 AND 1),\n    StartDate DATE NOT NULL, EndDate DATE,\n    CONSTRAINT UQ_AC UNIQUE (AgentID, CarrierID, StartDate)\n);\n\nCREATE TABLE dbo.Clients (\n    ClientID INT IDENTITY(1,1) PRIMARY KEY,\n    FirstName VARCHAR(50) NOT NULL,\n    LastName VARCHAR(50) NOT NULL,\n    DateOfBirth DATE NOT NULL,\n    Email VARCHAR(100), Phone VARCHAR(20),\n    SSNHash VARBINARY(64),\n    CreatedDate DATETIME2 NOT NULL DEFAULT SYSDATETIME()\n);\n\nCREATE TABLE dbo.PolicyTypes (\n    PolicyTypeID INT IDENTITY(1,1) PRIMARY KEY,\n    TypeName VARCHAR(50) NOT NULL UNIQUE,\n    IsActive BIT NOT NULL DEFAULT 1\n);\n\nCREATE TABLE dbo.Policies (\n    PolicyID INT IDENTITY(1,1) PRIMARY KEY,\n    PolicyNumber VARCHAR(20) NOT NULL UNIQUE,\n    CarrierID INT NOT NULL REFERENCES dbo.Carriers(CarrierID),\n    PolicyTypeID INT NOT NULL REFERENCES dbo.PolicyTypes(PolicyTypeID),\n    PremiumAmount DECIMAL(19,4) NOT NULL CHECK (PremiumAmount >= 0),\n    EffectiveDate DATE NOT NULL,\n    ExpirationDate DATE NOT NULL,\n    Status VARCHAR(20) DEFAULT 'Active',\n    CONSTRAINT CK_Dates CHECK (ExpirationDate > EffectiveDate)\n);\n\nCREATE TABLE dbo.Enrollments (\n    EnrollmentID INT IDENTITY(1,1) PRIMARY KEY,\n    ClientID INT NOT NULL REFERENCES dbo.Clients(ClientID),\n    PolicyID INT NOT NULL REFERENCES dbo.Policies(PolicyID),\n    AgentID INT NOT NULL REFERENCES dbo.Agents(AgentID),\n    EnrollmentDate DATE NOT NULL,\n    Status VARCHAR(20) DEFAULT 'Active'\n);\n\nCREATE TABLE dbo.Commissions (\n    CommissionID INT IDENTITY(1,1) PRIMARY KEY,\n    EnrollmentID INT NOT NULL REFERENCES dbo.Enrollments(EnrollmentID),\n    AgentID INT NOT NULL REFERENCES dbo.Agents(AgentID),\n    Amount DECIMAL(19,4) NOT NULL,\n    PaymentDate DATE, Status VARCHAR(20) DEFAULT 'Pending'\n);\n\nCREATE TABLE dbo.Leads (\n    LeadID INT IDENTITY(1,1) PRIMARY KEY,\n    FirstName VARCHAR(50), LastName VARCHAR(50),\n    Email VARCHAR(100), Phone VARCHAR(20),\n    Source VARCHAR(50),\n    AssignedAgentID INT REFERENCES dbo.Agents(AgentID),\n    Status VARCHAR(20) DEFAULT 'New'\n);\n\n[VIS:RELATIONSHIPS]"}, {"title": "Power BI Fundamentals", "content": "**View optimized for Power BI:**\nCREATE VIEW dbo.vw_PolicyDashboard AS\nSELECT p.PolicyID, p.PremiumAmount, p.Status,\n    YEAR(p.EffectiveDate) AS PolicyYear,\n    pt.TypeName AS PolicyType,\n    c.CarrierName,\n    a.FirstName + ' ' + a.LastName AS AgentName\nFROM Policies p\nJOIN PolicyTypes pt ON p.PolicyTypeID = pt.PolicyTypeID\nJOIN Carriers c ON p.CarrierID = c.CarrierID\nJOIN Enrollments e ON p.PolicyID = e.PolicyID\nJOIN Agents a ON e.AgentID = a.AgentID;\n\n**Two modes:** Import (fast, stale) vs DirectQuery (live, DB handles load)\n\n**Interview Tip:** Show awareness of how DB design supports reporting. Mention star schemas, indexed views, query optimization for reports."}]}, {"id": 7, "title": "Monitoring & Troubleshooting", "icon": "🔍", "sections": [{"title": "DMVs — Diagnostic Toolkit", "content": "**Top queries by CPU:**\nSELECT TOP 10\n    qs.total_worker_time / qs.execution_count AS avg_cpu,\n    qs.execution_count,\n    SUBSTRING(st.text, (qs.statement_start_offset/2)+1,\n        ((CASE qs.statement_end_offset WHEN -1 THEN DATALENGTH(st.text)\n          ELSE qs.statement_end_offset END\n        - qs.statement_start_offset)/2)+1) AS query_text\nFROM sys.dm_exec_query_stats qs\nCROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) st\nORDER BY avg_cpu DESC;\n\n**Missing indexes:**\nSELECT d.statement, d.equality_columns, d.included_columns,\n    gs.avg_user_impact, gs.user_seeks\nFROM sys.dm_db_missing_index_details d\nJOIN sys.dm_db_missing_index_groups g ON d.index_handle = g.index_handle\nJOIN sys.dm_db_missing_index_group_stats gs\n    ON g.index_group_handle = gs.group_handle\nORDER BY gs.avg_user_impact * gs.user_seeks DESC;\n\n**Key Wait Stats:**\n• **PAGEIOLATCH_SH** — disk reads (need more RAM)\n• **LCK_M_X** — lock waits (blocking)\n• **SOS_SCHEDULER_YIELD** — CPU pressure\n• **CXPACKET** — parallelism"}, {"title": "Troubleshooting Scenarios", "content": "**\"App is slow\":**\n1. sys.dm_exec_requests — blocking?\n2. Execution plan — scans? key lookups?\n3. SET STATISTICS IO ON — logical reads?\n4. Missing indexes / stale statistics?\n\n**\"Proc was fast, now slow\" (parameter sniffing):**\nEXEC sp_recompile 'dbo.usp_MyProc';\n-- Or: OPTION (RECOMPILE)\n\n**\"Deadlocks\":**\nDBCC TRACEON (1222, -1);\n-- Fix: same table order, add indexes, RCSI\n\n**\"tempdb growing\":**\nSELECT\n    SUM(user_object_reserved_page_count)*8/1024 AS UserObj_MB,\n    SUM(version_store_reserved_page_count)*8/1024 AS VersionStore_MB\nFROM sys.dm_db_file_space_usage;\n\n**\"Deploy schema change\":**\nBEGIN TRY\n    BEGIN TRANSACTION;\n    ALTER TABLE Policies ADD NewCol VARCHAR(50);\n    COMMIT;\nEND TRY\nBEGIN CATCH\n    IF @@TRANCOUNT > 0 ROLLBACK;\n    PRINT 'Failed: ' + ERROR_MESSAGE();\nEND CATCH;"}]}, {"id": 8, "title": "Interview Strategy & Cheat Sheet", "icon": "🎯", "sections": [{"title": "2-Hour Game Plan", "content": "**Likely Format:**\n• 20-30 min: Conceptual questions\n• 30-40 min: Live coding\n• 20-30 min: Performance tuning scenario\n• 15-20 min: Schema design exercise\n• 10-15 min: Behavioral\n\n**Phrases That Impress:**\n• \"That depends on the cardinality...\"\n• \"I'd check the execution plan for seeks vs scans...\"\n• \"I'd use a covering index with INCLUDE...\"\n• \"I'd recommend RCSI for reader-writer contention...\"\n\n**Company Prep:** SalesRadix (CRM), InsureMe (enrollment), iWebQuotes (quoting). Think: lead volume, policy lifecycle, commission calcs, open enrollment spikes.\n\n**Ask THEM:**\n• What SQL Server version?\n• Biggest table sizes?\n• Always On AGs?\n• Deployment process for DB changes?\n• Query Store usage?"}, {"title": "Quick Reference Commands", "content": "**Diagnostics:**\nsp_who2                           -- active sessions\nsp_help 'TableName'               -- table structure\nsp_helpindex 'TableName'          -- indexes\nsp_helptext 'ProcName'            -- source code\nDBCC CHECKDB                      -- integrity\nDBCC SHOW_STATISTICS('Tbl','Idx') -- stats\nDBCC FREEPROCCACHE                -- clear plans\n\n**Date Functions:**\nGETDATE(), SYSDATETIME()\nDATEADD(month, 1, @date)\nDATEDIFF(day, @start, @end)\nEOMONTH(@date)\nFORMAT(@date, 'yyyy-MM-dd')\n\n**String Functions:**\nSTRING_AGG(column, ',')\nCONCAT(a, b, c)\nCHARINDEX('find', @str)\nSTUFF(@str, start, len, 'new')\n\n**NULL Handling:**\nISNULL(a, default)\nCOALESCE(a, b, c)\nNULLIF(a, b)\n\n**Pagination:**\nSELECT * FROM Policies\nORDER BY PolicyID\nOFFSET 20 ROWS FETCH NEXT 10 ROWS ONLY;"}]}];
const visuals={"CROWSFOOT": "<div class=\"visual-block\"><div class=\"vis-title\">Crow's foot notation — visual guide</div><div class=\"vis-row\"><div class=\"vis-card\"><svg width=\"100%\" viewBox=\"0 0 220 70\"><line x1=\"20\" y1=\"35\" x2=\"200\" y2=\"35\" stroke=\"#6c757d\" stroke-width=\"2\"/><line x1=\"28\" y1=\"16\" x2=\"28\" y2=\"54\" stroke=\"#3b82f6\" stroke-width=\"2.5\"/><line x1=\"36\" y1=\"16\" x2=\"36\" y2=\"54\" stroke=\"#3b82f6\" stroke-width=\"2.5\"/><line x1=\"184\" y1=\"16\" x2=\"184\" y2=\"54\" stroke=\"#3b82f6\" stroke-width=\"2.5\"/><line x1=\"192\" y1=\"16\" x2=\"192\" y2=\"54\" stroke=\"#3b82f6\" stroke-width=\"2.5\"/></svg><div class=\"vis-label\">One-to-one (1:1)</div><div class=\"vis-desc\">||--------|| Each side exactly one</div></div><div class=\"vis-card\"><svg width=\"100%\" viewBox=\"0 0 220 70\"><line x1=\"20\" y1=\"35\" x2=\"200\" y2=\"35\" stroke=\"#6c757d\" stroke-width=\"2\"/><line x1=\"28\" y1=\"16\" x2=\"28\" y2=\"54\" stroke=\"#8b5cf6\" stroke-width=\"2.5\"/><line x1=\"36\" y1=\"16\" x2=\"36\" y2=\"54\" stroke=\"#8b5cf6\" stroke-width=\"2.5\"/><line x1=\"178\" y1=\"14\" x2=\"200\" y2=\"35\" stroke=\"#8b5cf6\" stroke-width=\"2.5\"/><line x1=\"178\" y1=\"56\" x2=\"200\" y2=\"35\" stroke=\"#8b5cf6\" stroke-width=\"2.5\"/><circle cx=\"170\" cy=\"35\" r=\"6\" fill=\"none\" stroke=\"#8b5cf6\" stroke-width=\"2\"/></svg><div class=\"vis-label\">One-to-many (1:M)</div><div class=\"vis-desc\">||--------o{ One carrier → many policies</div></div><div class=\"vis-card\"><svg width=\"100%\" viewBox=\"0 0 220 70\"><line x1=\"20\" y1=\"35\" x2=\"200\" y2=\"35\" stroke=\"#6c757d\" stroke-width=\"2\"/><line x1=\"42\" y1=\"14\" x2=\"20\" y2=\"35\" stroke=\"#10b981\" stroke-width=\"2.5\"/><line x1=\"42\" y1=\"56\" x2=\"20\" y2=\"35\" stroke=\"#10b981\" stroke-width=\"2.5\"/><circle cx=\"50\" cy=\"35\" r=\"6\" fill=\"none\" stroke=\"#10b981\" stroke-width=\"2\"/><line x1=\"178\" y1=\"14\" x2=\"200\" y2=\"35\" stroke=\"#10b981\" stroke-width=\"2.5\"/><line x1=\"178\" y1=\"56\" x2=\"200\" y2=\"35\" stroke=\"#10b981\" stroke-width=\"2.5\"/><circle cx=\"170\" cy=\"35\" r=\"6\" fill=\"none\" stroke=\"#10b981\" stroke-width=\"2\"/></svg><div class=\"vis-label\">Many-to-many (M:M)</div><div class=\"vis-desc\">}o--------o{ Via junction table</div></div></div><div class=\"vis-row\" style=\"margin-top:14px;gap:20px\"><div class=\"vis-sym\"><svg width=\"36\" height=\"20\" viewBox=\"0 0 36 20\"><line x1=\"0\" y1=\"10\" x2=\"36\" y2=\"10\" stroke=\"#6c757d\" stroke-width=\"2\"/><line x1=\"28\" y1=\"2\" x2=\"28\" y2=\"18\" stroke=\"#343a40\" stroke-width=\"2.5\"/><line x1=\"22\" y1=\"2\" x2=\"22\" y2=\"18\" stroke=\"#343a40\" stroke-width=\"2.5\"/></svg><span>Exactly one</span></div><div class=\"vis-sym\"><svg width=\"36\" height=\"20\" viewBox=\"0 0 36 20\"><line x1=\"0\" y1=\"10\" x2=\"28\" y2=\"10\" stroke=\"#6c757d\" stroke-width=\"2\"/><line x1=\"26\" y1=\"2\" x2=\"36\" y2=\"10\" stroke=\"#343a40\" stroke-width=\"2.5\"/><line x1=\"26\" y1=\"18\" x2=\"36\" y2=\"10\" stroke=\"#343a40\" stroke-width=\"2.5\"/></svg><span>Many (crow's foot)</span></div><div class=\"vis-sym\"><svg width=\"36\" height=\"20\" viewBox=\"0 0 36 20\"><line x1=\"0\" y1=\"10\" x2=\"36\" y2=\"10\" stroke=\"#6c757d\" stroke-width=\"2\"/><circle cx=\"28\" cy=\"10\" r=\"5\" fill=\"none\" stroke=\"#343a40\" stroke-width=\"2\"/></svg><span>Zero (optional)</span></div></div></div>", "RELATIONSHIPS": "<div class=\"visual-block\"><div class=\"vis-title\">All relationships in the schema</div><table class=\"rel-table\"><thead><tr><th>From</th><th>Type</th><th>To</th><th>How to read it</th></tr></thead><tbody><tr><td>Carriers</td><td class=\"rel-1m\">1:M</td><td>Policies</td><td>One carrier underwrites many policies</td></tr><tr><td>Carriers</td><td class=\"rel-mm\">M:M</td><td>Agents</td><td>Via AgentCarriers junction table</td></tr><tr><td>Agents</td><td class=\"rel-1m\">1:M</td><td>AgentStates</td><td>One agent licensed in many states</td></tr><tr><td>Agents</td><td class=\"rel-1m\">1:M</td><td>Enrollments</td><td>One agent handles many enrollments</td></tr><tr><td>Agents</td><td class=\"rel-1m\">1:M</td><td>Leads</td><td>One agent assigned many leads</td></tr><tr><td>Agents</td><td class=\"rel-1m\">1:M</td><td>Commissions</td><td>One agent earns many commissions</td></tr><tr><td>Clients</td><td class=\"rel-1m\">1:M</td><td>Enrollments</td><td>One client has many enrollments</td></tr><tr><td>PolicyTypes</td><td class=\"rel-1m\">1:M</td><td>Policies</td><td>One type categorizes many policies</td></tr><tr><td>Policies</td><td class=\"rel-1m\">1:M</td><td>Enrollments</td><td>One policy covers many enrollments</td></tr><tr><td>Enrollments</td><td class=\"rel-1m\">1:M</td><td>Commissions</td><td>One enrollment generates commissions</td></tr></tbody></table></div>", "ERD_MERMAID": "<div class=\"visual-block\"><div class=\"vis-title\">Interactive ER Diagram — full insurance schema</div><div id=\"erd-container\" class=\"erd-box\"><div class=\"erd-loading\">Loading diagram...</div></div></div>"};

  Carriers { int CarrierID PK varchar CarrierName UK varchar CarrierCode UK bit IsActive }
  Agents { int AgentID PK varchar FirstName varchar LastName varchar Email UK bit IsActive }
  AgentStates { int AgentStateID PK int AgentID FK char2 StateCode varchar LicenseNo }
  AgentCarriers { int AgentCarrierID PK int AgentID FK int CarrierID FK decimal CommissionRate }
  Clients { int ClientID PK varchar FirstName varchar LastName date DateOfBirth varchar Email }
  PolicyTypes { int PolicyTypeID PK varchar TypeName UK bit IsActive }
  Policies { int PolicyID PK varchar PolicyNumber UK int CarrierID FK int PolicyTypeID FK decimal PremiumAmount }
  Enrollments { int EnrollmentID PK int ClientID FK int PolicyID FK int AgentID FK date EnrollmentDate }
  Commissions { int CommissionID PK int EnrollmentID FK int AgentID FK decimal Amount }
  Leads { int LeadID PK varchar FirstName varchar Email int AssignedAgentID FK varchar Status }

  Agents ||--o{ AgentCarriers : "contracted"
  Carriers ||--o{ AgentCarriers : "contracts"
  Carriers ||--o{ Policies : "underwrites"
  PolicyTypes ||--o{ Policies : "categorizes"
  Agents ||--o{ Enrollments : "sells"
  Clients ||--o{ Enrollments : "enrolled in"
  Policies ||--o{ Enrollments : "covers"
  Enrollments ||--o{ Commissions : "generates"
  Agents ||--o{ Commissions : "earns"
  Agents ||--o{ Leads : "assigned"
`;

let ac=0,as2=0,done=new Set();
try{const s=localStorage.getItem('sqlprep-v3');if(s)done=new Set(JSON.parse(s))}catch(e){}
function sv(){try{localStorage.setItem('sqlprep-v3',JSON.stringify([...done]))}catch(e){}}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show')}
function renderSidebar(){const t=chapters.reduce((a,c)=>a+c.sections.length,0);const p=Math.round((done.size/t)*100);let h=`<div class="sidebar-logo"><div class="logo-badge">SQL</div><div class="logo-title">Interview Prep v3</div><div class="logo-sub">Sr. Database Engineer</div></div><div class="progress-area"><div class="progress-track"><div class="progress-fill" style="width:${p}%"></div></div><div class="progress-label">${done.size}/${t} sections \u00b7 ${p}%</div></div><nav class="nav">`;chapters.forEach((ch,ci)=>{const d=ch.sections.filter((_,si)=>done.has(`${ch.id}-${si}`)).length;h+=`<div class="chapter-item ${ci===ac?'active':''}" onclick="selC(${ci})"><span class="chapter-icon">${ch.icon}</span><div><div class="chapter-title">${ch.title}</div><div class="chapter-meta">${d}/${ch.sections.length} done</div></div></div>`;if(ci===ac){h+=`<div class="section-list">`;ch.sections.forEach((s,si)=>{const dn=done.has(`${ch.id}-${si}`);h+=`<div class="section-item ${si===as2?'active':''}" onclick="selS(${si})"><span class="check ${dn?'done':''}">${dn?'\u2713':'\u25cb'}</span><span>${s.title}</span></div>`});h+=`</div>`}});h+=`</nav>`;document.getElementById('sidebar').innerHTML=h}
function renderContent(){const ch=chapters[ac],sec=ch.sections[as2],key=`${ch.id}-${as2}`,dn=done.has(key),isF=ac===0&&as2===0,isL=ac===chapters.length-1&&as2===ch.sections.length-1;document.getElementById('mobileTitle').textContent=`${ch.icon} ${ch.title}`;document.getElementById('content').innerHTML=`<div class="breadcrumb">Chapter ${ac+1} of ${chapters.length} \u2192 Section ${as2+1} of ${ch.sections.length}</div><h1 class="page-title">${sec.title}</h1><div class="body-content">${fmt(sec.content)}</div><div class="footer"><button class="btn btn-outline" onclick="prev()" ${isF?'disabled':''}>\u2190 Previous</button><button class="btn ${dn?'btn-complete':'btn-mark'}" onclick="tog()">${dn?'\u2713 Completed':'Mark Complete'}</button><button class="btn btn-primary" onclick="next()" ${isL?'disabled':''}>Next \u2192</button></div>`;window.scrollTo(0,0);document.querySelector('.main').scrollTo(0,0);loadMermaid()}
function fmt(text){const lines=text.split('\n');let html='';const kw=/^(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|FULL|CROSS|GROUP|ORDER|HAVING|INSERT|UPDATE|DELETE|CREATE|ALTER|DROP|MERGE|WITH|SET|BEGIN|END|IF|ELSE|DECLARE|EXEC|RETURN|THROW|UNION|PIVOT|CASE|WHEN|THEN|INTO|VALUES|ON|AS|AND|OR|NOT|IN|EXISTS|BETWEEN|LIKE|OPTION|USING|MATCHED|OFFSET|FETCH|GO|USE|DBCC|BACKUP|RESTORE|RETURNS|TABLE|PRINT|RAISERROR|OUTPUT|CONSTRAINT|CHECK|ADD|REFERENCES|DEFAULT|UNIQUE|IDENTITY|INDEX)/i;const ik=/^\s{2,}(SELECT|FROM|WHERE|JOIN|SET|AND|OR|WHEN|THEN|ELSE|END|ON|ORDER|GROUP|HAVING|\(|,|--|\)|INTO|VALUES|AS|RETURN|CASE|INSERT|UPDATE|DELETE|CROSS|OUTER|UNION|USING|NOT|OPTION|ROWS|BETWEEN|ADD|WITH|LIKE|CHECK|CONSTRAINT|REFERENCES|DEFAULT|PRINT)/i;for(const line of lines){const vm=line.match(/^\[VIS:(\w+)\]$/);if(vm&&visuals[vm[1]]){html+=visuals[vm[1]]}else if(line.startsWith('**')&&line.endsWith('**'))html+=`<h3>${line.replace(/\*\*/g,'')}</h3>`;else if(line.match(/^\u2022 /))html+=`<div class="bullet"><span class="bullet-dot">\u2192</span><span>${ib(line.substring(2))}</span></div>`;else if(line.match(/^-- /))html+=`<div class="comment-line">${esc(line)}</div>`;else if((line.trim().match(kw)&&!line.startsWith('\u2022'))||line.trim().match(ik))html+=`<div class="code-line">${esc(line)}</div>`;else if(line.trim()==='')html+=`<div class="spacer"></div>`;else html+=`<p>${ib(line)}</p>`}return html}
function ib(t){return esc(t).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function selC(ci){ac=ci;as2=0;render();closeSidebar()}
function selS(si){as2=si;render();closeSidebar()}
function next(){const ch=chapters[ac];if(as2<ch.sections.length-1)as2++;else if(ac<chapters.length-1){ac++;as2=0}render()}
function prev(){if(as2>0)as2--;else if(ac>0){ac--;as2=chapters[ac].sections.length-1}render()}
function tog(){const key=`${chapters[ac].id}-${as2}`;if(done.has(key))done.delete(key);else done.add(key);sv();render()}
function render(){renderSidebar();renderContent()}
async function loadMermaid(){const c=document.getElementById('erd-container');if(!c)return;if(window.mermaid){doMermaid();return}if(window._mLoading)return;window._mLoading=true;const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js';s.onload=function(){window._mLoaded=true;doMermaid()};s.onerror=function(){c.innerHTML='<div class="erd-loading">Could not load diagram library. Try refreshing.</div>'};document.head.appendChild(s)}
async function doMermaid(){const c=document.getElementById('erd-container');if(!c||!window.mermaid)return;const m=window.mermaid;m.initialize({startOnLoad:false,theme:document.body.classList.contains('dark')?'dark':'default',fontFamily:'"IBM Plex Sans",sans-serif',themeVariables:{darkMode:document.body.classList.contains('dark'),fontSize:'12px',lineColor:document.body.classList.contains('dark')?'#6b7280':'#6c757d',textColor:document.body.classList.contains('dark')?'#c8ccd4':'#343a40',primaryColor:document.body.classList.contains('dark')?'#1e2230':'#e9ecef',primaryBorderColor:'#3b82f6',primaryTextColor:document.body.classList.contains('dark')?'#e2e5eb':'#2d2d44'}});try{const id='erd-svg-'+Date.now();const{svg}=await m.render(id,mermaidSrc);c.innerHTML=svg}catch(e){c.innerHTML='<div class="erd-loading">Diagram error: '+e.message+'</div>'}}
function toggleTheme(){
  const body=document.body;
  const isDark=body.classList.contains('dark');
  if(isDark){body.classList.remove('dark');body.classList.add('light');localStorage.setItem('sqlprep-theme','light');document.getElementById('themeToggle').textContent='\u263e'}
  else{body.classList.remove('light');body.classList.add('dark');localStorage.setItem('sqlprep-theme','dark');document.getElementById('themeToggle').textContent='\u2600'}
  if(document.getElementById('erd-container')){window._mLoaded=false;loadMermaid()}
}
(function(){const t=localStorage.getItem('sqlprep-theme')||'dark';document.body.classList.add(t);document.getElementById('themeToggle').textContent=t==='dark'?'\u2600':'\u263e'})();

render();
</script>
</body>
